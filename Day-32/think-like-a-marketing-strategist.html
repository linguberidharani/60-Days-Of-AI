<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think Like a Marketing Strategist</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  :root{
    --bg: #05070c;
    --bg-panel: #0c1220;
    --bg-card: #101827;
    --bg-card-hover: #141f33;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text-primary: #eaf2ff;
    --text-secondary: #93a4c3;
    --text-muted: #59698c;

    --cyan: #35d0f5;
    --cyan-dim: rgba(53,208,245,0.14);
    --cyan-border: rgba(53,208,245,0.35);

    --purple: #b18cff;
    --purple-dim: rgba(177,140,255,0.14);
    --purple-border: rgba(177,140,255,0.35);

    --green: #3fe0a5;
    --green-dim: rgba(63,224,165,0.14);
    --green-border: rgba(63,224,165,0.35);

    --orange: #ffa24d;
    --orange-dim: rgba(255,162,77,0.14);
    --orange-border: rgba(255,162,77,0.35);

    --font-display: 'Segoe UI Semibold', 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(53,208,245,0.08), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(177,140,255,0.08), transparent 40%),
      var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    line-height: 1.5;
  }

  #root{ min-height: 100vh; }

  ::selection{ background: var(--cyan-dim); color: var(--text-primary); }

  a{ color: inherit; }

  /* ---------- Layout shells ---------- */
  .app-shell{
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 22px 80px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 16px;
    padding: 6px 2px 26px;
  }

  .brandmark{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .brandmark .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
  }

  .topbar-actions{ display:flex; gap:10px; }

  /* ---------- Buttons ---------- */
  .btn{
    font-family: var(--font-body);
    font-size: 14.5px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text-primary);
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
    display:inline-flex;
    align-items:center;
    gap: 8px;
  }
  .btn:hover{ transform: translateY(-1px); border-color: var(--cyan-border); background: var(--bg-card-hover); }
  .btn:active{ transform: translateY(0px); }
  .btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  .btn-primary{
    background: linear-gradient(135deg, var(--cyan), #1fa8cc);
    color: #04141a;
    border: 1px solid transparent;
    box-shadow: 0 8px 24px rgba(53,208,245,0.25);
  }
  .btn-primary:hover{ box-shadow: 0 10px 30px rgba(53,208,245,0.4); background: linear-gradient(135deg, #4fdaff, var(--cyan)); }

  .btn-ghost{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-ghost:hover{ color: var(--text-primary); border-color: var(--border-strong); }

  .btn-lg{ font-size: 16px; padding: 16px 34px; border-radius: 14px; }

  .btn:disabled{ opacity: 0.4; cursor: not-allowed; transform:none; box-shadow:none; }

  /* ---------- Progress bar ---------- */
  .progress-wrap{ margin-bottom: 30px; }
  .progress-label{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    display:flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .progress-track{
    height: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill{
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    transition: width .5s cubic-bezier(.65,0,.35,1);
    box-shadow: 0 0 14px rgba(53,208,245,0.5);
  }

  /* ---------- Cards ---------- */
  .card{
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    animation: fadeUp .5s ease both;
  }

  .card-accent-cyan{ border-color: var(--cyan-border); box-shadow: 0 0 0 1px rgba(53,208,245,0.06), 0 12px 30px -18px rgba(53,208,245,0.5); }
  .card-accent-purple{ border-color: var(--purple-border); box-shadow: 0 0 0 1px rgba(177,140,255,0.06), 0 12px 30px -18px rgba(177,140,255,0.5); }
  .card-accent-green{ border-color: var(--green-border); box-shadow: 0 0 0 1px rgba(63,224,165,0.06), 0 12px 30px -18px rgba(63,224,165,0.5); }
  .card-accent-orange{ border-color: var(--orange-border); box-shadow: 0 0 0 1px rgba(255,162,77,0.06), 0 12px 30px -18px rgba(255,162,77,0.5); }

  .grid{ display:grid; gap: 16px; }
  .grid-2{ grid-template-columns: repeat(2, 1fr); }
  .grid-3{ grid-template-columns: repeat(3, 1fr); }

  @media (max-width: 720px){
    .grid-2, .grid-3{ grid-template-columns: 1fr; }
  }

  .eyebrow{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow.cyan{ color: var(--cyan); }
  .eyebrow.purple{ color: var(--purple); }
  .eyebrow.green{ color: var(--green); }
  .eyebrow.orange{ color: var(--orange); }

  h1,h2,h3,h4{ font-family: var(--font-display); margin: 0 0 8px; letter-spacing: -0.01em; }

  .display-title{
    font-size: clamp(32px, 5vw, 50px);
    font-weight: 800;
    line-height: 1.06;
    letter-spacing: -0.02em;
  }
  .section-title{ font-size: 24px; font-weight: 700; }
  .card-title{ font-size: 17px; font-weight: 700; margin-bottom: 6px; }

  .subtitle{ color: var(--text-secondary); font-size: 16.5px; }
  .muted{ color: var(--text-muted); }
  .body-text{ color: var(--text-secondary); font-size: 14.5px; }

  /* ---------- Welcome ---------- */
  .welcome-hero{
    padding: 56px 6px 10px;
    text-align: left;
  }
  .compass{
    width: 74px; height: 74px;
    margin-bottom: 26px;
    animation: spin-slow 26s linear infinite;
  }
  @keyframes spin-slow{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }

  .welcome-points{
    margin-top: 34px;
    display:grid;
    gap: 14px;
  }
  .welcome-point{
    display:flex;
    gap: 14px;
    align-items:flex-start;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--bg-panel);
  }
  .welcome-point .num{
    font-family: var(--font-mono);
    color: var(--cyan);
    font-size: 13px;
    border: 1px solid var(--cyan-border);
    background: var(--cyan-dim);
    border-radius: 8px;
    padding: 3px 8px;
    flex-shrink: 0;
  }

  .cta-row{ margin-top: 38px; display:flex; gap: 14px; flex-wrap: wrap; align-items:center; }

  /* ---------- Mode selection ---------- */
  .mode-card{
    cursor:pointer;
    text-align:left;
    display:flex;
    flex-direction:column;
    gap: 10px;
    transition: transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .mode-card:hover{ transform: translateY(-3px); background: var(--bg-card-hover); }
  .mode-card:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 3px; }
  .mode-icon{ font-size: 30px; }

  /* ---------- Forms ---------- */
  .field{ margin-bottom: 16px; }
  .field label{
    display:block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .field input, .field textarea{
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14.5px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field textarea:focus{
    outline:none;
    border-color: var(--cyan-border);
    box-shadow: 0 0 0 3px var(--cyan-dim);
  }
  .field textarea{ resize: vertical; min-height: 64px; }

  /* ---------- Chips / selectable ---------- */
  .chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-secondary);
    font-size: 13.5px;
    font-weight: 600;
    cursor:pointer;
    transition: all .15s ease;
  }
  .chip:hover{ border-color: var(--border-strong); color: var(--text-primary); }
  .chip.selected{
    background: var(--cyan-dim);
    border-color: var(--cyan-border);
    color: var(--cyan);
  }
  .chip.selected.purple{ background: var(--purple-dim); border-color: var(--purple-border); color: var(--purple); }
  .chip-row{ display:flex; flex-wrap:wrap; gap: 10px; }

  /* ---------- Platform / pillar cards ---------- */
  .selectable-card{
    border: 1px solid var(--border);
    background: var(--bg-card);
    border-radius: 14px;
    padding: 18px 18px;
    cursor: pointer;
    transition: all .15s ease;
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .selectable-card:hover{ border-color: var(--border-strong); background: var(--bg-card-hover); }
  .selectable-card.on{
    border-color: var(--cyan-border);
    background: var(--cyan-dim);
    box-shadow: 0 0 0 1px rgba(53,208,245,0.15);
  }
  .selectable-card.fit-no{ opacity: 0.72; }
  .selectable-card .row-top{ display:flex; align-items:center; justify-content: space-between; }
  .fit-tag{
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .fit-tag.yes{ background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
  .fit-tag.no{ background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

  .check-badge{
    width: 20px; height:20px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    font-size: 12px;
    color: transparent;
    transition: all .15s ease;
  }
  .selectable-card.on .check-badge{
    background: var(--cyan);
    border-color: var(--cyan);
    color: #04141a;
  }

  /* ---------- Prompt card ---------- */
  .prompt-card{
    margin-top: 24px;
    border: 1px dashed var(--purple-border);
    background: linear-gradient(180deg, var(--purple-dim), transparent 60%);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .prompt-text{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.6;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 10px;
    border: 1px solid var(--border);
  }
  .copy-btn{
    margin-top: 12px;
  }

  /* ---------- Week roadmap ---------- */
  .week-card{
    border-left: 3px solid var(--cyan);
    padding-left: 18px;
    position: relative;
  }
  .week-card::before{
    content: '';
    position:absolute;
    left: -6px; top: 6px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
  }
  .week-card.w2{ border-color: var(--purple); }
  .week-card.w2::before{ background: var(--purple); box-shadow: 0 0 10px var(--purple); }
  .week-card.w3{ border-color: var(--green); }
  .week-card.w3::before{ background: var(--green); box-shadow: 0 0 10px var(--green); }
  .week-card.w4{ border-color: var(--orange); }
  .week-card.w4::before{ background: var(--orange); box-shadow: 0 0 10px var(--orange); }

  .week-goals{ margin: 10px 0 0; padding-left: 20px; color: var(--text-secondary); font-size: 14px; }
  .week-goals li{ margin-bottom: 6px; }

  /* ---------- Event ---------- */
  .event-banner{
    display:flex;
    gap: 16px;
    align-items:flex-start;
  }
  .event-emoji{ font-size: 34px; line-height:1; }
  .response-option{
    text-align:left;
    width: 100%;
    padding: 16px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-primary);
    cursor:pointer;
    font-family: var(--font-body);
    font-size: 14.5px;
    font-weight: 600;
    transition: all .15s ease;
    margin-bottom: 10px;
  }
  .response-option:hover{ border-color: var(--cyan-border); background: var(--cyan-dim); }
  .response-option.picked{ border-color: var(--green-border); background: var(--green-dim); color: var(--green); }

  .consequence-grid{ margin-top: 18px; }
  .consequence-box{
    border-radius: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
  }

  /* ---------- Report ---------- */
  .score-wrap{
    display:flex;
    align-items:center;
    gap: 26px;
    flex-wrap: wrap;
  }
  .score-ring-label{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .score-number{
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 40px;
  }

  .lessons-list{ margin: 10px 0 0; padding-left: 20px; color: var(--text-secondary); font-size: 14.5px; }
  .lessons-list li{ margin-bottom: 8px; }

  /* ---------- Nav footer ---------- */
  .step-footer{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 30px;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ---------- Animations ---------- */
  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  .fade-in{ animation: fadeUp .5s ease both; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
  }

  @media (max-width: 640px){
    .app-shell{ padding: 20px 16px 60px; }
    .card{ padding: 18px; }
  }
</style>
</head>

function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

function generateRandomClient(){
  const base = pick(RANDOM_CLIENTS);
  const variance = Math.round((Math.random() * 0.6 + 0.7) * base.budgetBase / 50) * 50;
  return {
    businessName: base.businessName,
    industry: base.industry,
    products: base.products,
    audience: base.audience,
    budget: '$' + variance.toLocaleString(),
    competitors: base.competitors,
    challenge: base.challenge,
  };
}

// Very lightweight keyword-based platform fit reasoning
function getPlatformFit(platform, mode, profile){
  const industry = (profile.industry || profile.profession || '').toLowerCase();
  const audience = (profile.audience || '').toLowerCase();
  const isVisual = /beauty|fashion|furniture|food|coffee|fitness|pet|design|photograph/.test(industry);
  const isB2B = /saas|software|b2b|logistics|consult|agency|law|finance/.test(industry) || /manager|founder|operations|business/.test(audience);
  const isYoung = /gen z|18|20s|22|24|25/.test(audience);

  if (mode === 'personal'){
    switch(platform.id){
      case 'linkedin': return { fits:true, reason: 'The default home for professional credibility — ideal for sharing expertise and career-building content.' };
      case 'twitter': return { fits:true, reason: 'Best platform for fast, opinion-driven thought leadership and joining real-time industry conversation.' };
      case 'youtube': return { fits:true, reason: 'Long-form video builds the deepest trust and is highly searchable for years after posting.' };
      case 'newsletter': return { fits:true, reason: 'The one channel you fully own — no algorithm between you and your audience.' };
      case 'instagram': return { fits: isVisual || isYoung, reason: isVisual || isYoung ? 'Good for humanizing your brand with behind-the-scenes and process content.' : 'Useful for personality, but secondary to LinkedIn or X for your kind of expertise.' };
      case 'tiktok': return { fits: isYoung, reason: isYoung ? 'Strong reach with a younger audience through short, authentic video.' : 'Only worth it if you are comfortable with short-form video and your audience skews younger.' };
      case 'podcast': return { fits:true, reason: 'A long-form format that builds deep trust — great for establishing authority over time.' };
      case 'blog': return { fits:true, reason: 'Great for SEO-driven discovery and repurposing into other formats.' };
      case 'facebook': return { fits:false, reason: 'Skews toward an older, less career-focused audience — usually not the best use of limited time.' };
      case 'pinterest': return { fits:false, reason: 'Built for visual discovery of products and ideas, not personal authority-building.' };
      default: return { fits:false, reason: 'Not a strong first choice for this kind of personal brand.' };
    }
  }

  // business / random client
  switch(platform.id){
    case 'instagram': return { fits: isVisual, reason: isVisual ? 'Highly visual product and audience make this a strong fit for discovery and community-building.' : 'Only useful here if you invest in strong visual storytelling despite a less visual product.' };
    case 'facebook': return { fits: !isB2B, reason: !isB2B ? 'Still effective for local reach, community groups, and an older core audience.' : 'Typically low-value for reaching decision-makers in a B2B context.' };
    case 'linkedin': return { fits: isB2B, reason: isB2B ? 'Where your actual buyers spend their professional time — ideal for credibility and lead generation.' : 'Only worth it if you are also hiring or building B2B partnerships alongside your core audience.' };
    case 'tiktok': return { fits: isYoung || isVisual, reason: isYoung || isVisual ? 'Short-form video can drive strong discovery for a visual, relatable product.' : 'Possible but not a natural fit without a younger or highly visual audience.' };
    case 'youtube': return { fits:true, reason: 'Useful for tutorials, product demos, or storytelling that builds trust before purchase.' };
    case 'pinterest': return { fits: isVisual, reason: isVisual ? 'A strong discovery engine for visually-driven products with long content lifespan.' : 'Less relevant unless your product has a strong visual or aspirational angle.' };
    case 'twitter': return { fits: isB2B, reason: isB2B ? 'Good for industry visibility, customer support, and reaching other businesses directly.' : 'Can work for personality and support, but rarely a primary growth channel here.' };
    case 'newsletter': return { fits:true, reason: 'An owned channel that turns casual interest into a nurtured, repeat-buying relationship.' };
    case 'blog': return { fits: isB2B, reason: isB2B ? 'Strong for SEO-driven lead generation and establishing authority with buyers who research before purchasing.' : 'Helpful for SEO, though secondary to more visual channels for this audience.' };
    case 'podcast': return { fits: isB2B, reason: isB2B ? 'A strong trust-building format for a considered, higher-cost purchase decision.' : 'A bigger investment — only worth it if you can sustain a consistent release schedule.' };
    default: return { fits:false, reason: 'Not a priority channel for this business right now.' };
  }
}

function generateInsights(profile, mode){
  const name = mode === 'personal' ? profile.name : profile.businessName;
  const audience = profile.audience;
  const challenge = profile.challenge;
  const goalText = mode === 'personal'
    ? `Grow ${name || 'this personal brand'} into a recognized, trusted voice in ${profile.expertise || 'their field'}, turning followers into real opportunities.`
    : `Turn ${name || 'this business'}'s existing strengths into predictable, repeatable customer growth — not just occasional spikes.`;
  const positioning = mode === 'personal'
    ? `${name || 'This person'} should be known as the go-to voice for ${profile.expertise || 'their expertise'}, distinct from generic advice-givers in the same space.`
    : `${name || 'This brand'} should be positioned as the clear, trustworthy choice for ${audience || 'its target customer'} — not competing on price alone.`;
  const painPoints = mode === 'personal'
    ? (profile.challengeText || challenge || 'Standing out in a crowded space without a large existing audience.')
    : (challenge || 'Converting interest into consistent sales without a large existing audience.');
  const opportunity = mode === 'personal'
    ? `A specific, well-defined niche around ${profile.expertise || 'their core expertise'} that a generalist competitor could not easily copy.`
    : `A specific, well-defined niche within ${profile.industry || 'their category'} that a larger, generic competitor could not easily copy.`;

  return { goalText, positioning, painPoints, opportunity };
}

function computeScore(state){
  let score = 55;
  const mode = state.mode;

  // Platform selection: reward selecting platforms that fit
  const fits = state.selectedPlatforms.map(id => {
    const platform = PLATFORMS.find(p => p.id === id);
    return getPlatformFit(platform, mode, state.profile).fits;
  });
  const fitCount = fits.filter(Boolean).length;
  const totalSelected = state.selectedPlatforms.length || 1;
  score += Math.round((fitCount / totalSelected) * 14);
  if (totalSelected >= 2 && totalSelected <= 5) score += 4;

  // Pillars: reward exactly 3 selected
  if (state.selectedPillars.length === 3) score += 10;

  // Event response
  if (state.eventChoice) score += Math.round(state.eventChoice.scoreImpact * 1.3);

  return clamp(Math.round(score), 0, 100);
}

function PromptCard({ title, prompt }){
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    try {
      navigator.clipboard.writeText(prompt);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {
      setCopied(false);
    }
  };
  return (
    <div className="prompt-card">
      <div className="eyebrow purple">✦ {title || 'How to Ask Claude'}</div>
      <div className="prompt-text">{prompt}</div>
      <button className="btn btn-ghost copy-btn" onClick={handleCopy}>
        {copied ? '✓ Copied' : '⧉ Copy prompt'}
      </button>
    </div>
  );
}

function CircularScore({ score }){
  const radius = 62;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;
  const color = score >= 80 ? 'var(--green)' : score >= 55 ? 'var(--cyan)' : 'var(--orange)';
  return (
    <svg width="150" height="150" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r={radius} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="12" />
      <circle
        cx="75" cy="75" r={radius} fill="none"
        stroke={color} strokeWidth="12" strokeLinecap="round"
        strokeDasharray={circumference} strokeDashoffset={offset}
        transform="rotate(-90 75 75)"
        style={{ transition: 'stroke-dashoffset 1s cubic-bezier(.65,0,.35,1)' }}
      />
      <text x="75" y="82" textAnchor="middle" fontSize="34" fontWeight="800" fill="var(--text-primary)" fontFamily="var(--font-display)">{score}</text>
    </svg>
  );
}

function Step3Pillars({ profile, mode, selected, setSelected, onNext }){

      if (sel.length >= 3) return sel;
      return [...sel, id];
    });
  };
  const name = mode === 'personal' ? profile.name : profile.businessName;
  const chosenNames = pillars.filter(p => selected.includes(p.id)).map(p => p.name).join(', ');
  const prompt = `For ${name ? '"' + name + '"' : 'my brand'}, I've chosen these three content pillars: ${chosenNames || '[pillars]'}. Help me brainstorm 5 specific content ideas for each pillar that speak directly to ${profile.audience || '[audience]'}.`;

      <div className="grid grid-2">
        {pillars.map(p => {

              role="button"
              tabIndex={0}
              onClick={() => !disabled && toggle(p.id)}

function GrowthReport({ state, onReplay, onRestart }){
  const { mode, profile, selectedPlatforms, selectedPillars, eventChoice } = state;
  const name = mode === 'personal' ? profile.name : profile.businessName;
  const pillarList = (mode === 'personal' ? PERSONAL_PILLARS : BUSINESS_PILLARS).filter(p => selectedPillars.includes(p.id));
  const platformList = PLATFORMS.filter(p => selectedPlatforms.includes(p.id));
  const score = computeScore(state);

  const bestDecision = eventChoice && eventChoice.scoreImpact >= 7
    ? `Choosing to "${eventChoice.label.toLowerCase()}" during the unexpected event — a genuinely strategic, trust-building call.`
    : `Selecting focused, well-matched platforms (${platformList.slice(0,2).map(p=>p.name).join(', ') || 'your channels'}) instead of spreading effort everywhere.`;

  const biggestMistake = eventChoice && eventChoice.scoreImpact < 5
    ? `The event response — "${eventChoice.label.toLowerCase()}" — prioritized short-term comfort over long-term trust.`
    : (selectedPlatforms.length > 5
        ? 'Selecting too many platforms at once, which risks mediocre presence everywhere instead of strength somewhere.'
        : 'None major — the overall approach stayed disciplined. The next challenge is staying consistent once real results start rolling in.');

  const lessons = mode === 'personal'
    ? [
        'Authenticity outperforms polish — audiences follow people, not performances.',
        'Consistency compounds. A clear pillar rotation, kept up for months, beats sporadic viral swings.',
        'Niche clarity is a magnet. Trying to appeal to everyone quietly appeals to no one.',
      ]
    : [
        'Strategy precedes content — know the audience and positioning before writing a single post.',
        'Fewer, well-matched platforms outperform a scattered presence across every channel.',

      ];

  return (
    <div className="fade-in">
      <div className="eyebrow purple">Final Report</div>

        </div>
      </div>

      <div className="grid grid-2" style={{ marginTop: 18 }}>
        <div className="card card-accent-cyan">
          <div className="eyebrow cyan">Audience Understanding</div>
          <p className="body-text" style={{ marginTop: 8 }}>{profile.audience || 'Not specified.'}</p>
        </div>
        <div className="card card-accent-purple">
          <div className="eyebrow purple">Platform Strategy</div>
          <p className="body-text" style={{ marginTop: 8 }}>{platformList.map(p => p.name).join(', ') || 'No platforms selected.'}</p>
        </div>
        <div className="card card-accent-green">
          <div className="eyebrow green">Content Strategy</div>
          <p className="body-text" style={{ marginTop: 8 }}>{pillarList.map(p => p.name).join(', ') || 'No pillars selected.'}</p>
        </div>
        <div className="card card-accent-orange">
          <div className="eyebrow orange">Growth Potential</div>
          <p className="body-text" style={{ marginTop: 8 }}>
            {score >= 80 ? 'High — the foundation here could realistically compound into steady, durable growth.' : score >= 55 ? 'Moderate — a few sharper decisions would meaningfully improve the trajectory.' : 'Early-stage — the fundamentals need tightening before growth will feel consistent.'}
          </p>
        </div>
      </div>

      <div className="grid grid-2" style={{ marginTop: 16 }}>
        <div className="card">
          <div className="eyebrow green">✓ Best Decision</div>
          <p className="body-text" style={{ marginTop: 8 }}>{bestDecision}</p>
        </div>
        <div className="card">
          <div className="eyebrow orange">⚠ Biggest Mistake</div>

        </div>

      <div className="card" style={{ marginTop: 16 }}>

      <div className="step-footer">

        <button className="btn btn-primary" onClick={onReplay}>🔁 Replay with a New Scenario</button>
      </div>
    </div>
  );
}

const SCREENS = ['welcome', 'mode', 'form', 'step1', 'step2', 'step3', 'step4', 'step5', 'report'];
const STEP_LABELS = {
  welcome: 'Welcome', mode: 'Choose Your Path', form: 'Client Details',
  step1: 'Understand the Business', step2: 'Platform Strategy', step3: 'Content Pillars',
  step4: '30-Day Strategy', step5: 'Marketing Event', report: 'Final Report',
};

function initialState(){
  return {
    screen: 'welcome',
    mode: null,
    profile: {},
    selectedPlatforms: [],
    selectedPillars: [],
    event: null,
    eventChoice: null,
  };
}

function App(){
  const [state, setState] = useState(initialState());

  const goto = (screen) => setState(s => ({ ...s, screen }));

  const handleModeSelect = (mode) => {
    if (mode === 'random'){
      const profile = generateRandomClient();
      setState(s => ({ ...s, mode, profile, screen: 'form' }));
    } else {
      setState(s => ({ ...s, mode, screen: 'form' }));
    }
  };

  const handleFormSubmit = (profile) => {
    setState(s => ({ ...s, profile, screen: 'step1' }));
  };

  const handleStep4Next = () => {
    const pool = state.mode === 'personal' ? PERSONAL_EVENTS : BUSINESS_EVENTS;
    const event = pick(pool);
    setState(s => ({ ...s, event, eventChoice: null, screen: 'step5' }));
  };

  const handleReplay = () => {
    setState(s => {
      const mode = s.mode;
      let profile = s.profile;
      if (mode === 'random') profile = generateRandomClient();
      return {
        screen: mode === 'random' ? 'form' : 'step1',
        mode,
        profile,
        selectedPlatforms: [],
        selectedPillars: [],
        event: null,
        eventChoice: null,
      };
    });
  };

  const handleRestart = () => setState(initialState());

  const stepIndex = SCREENS.indexOf(state.screen);
  const showProgress = state.screen !== 'welcome';
  const pillarObjs = (state.mode === 'personal' ? PERSONAL_PILLARS : BUSINESS_PILLARS).filter(p => state.selectedPillars.includes(p.id));

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="brandmark"><span className="dot"></span> Marketing Strategist Simulator</div>
        {state.screen !== 'welcome' && (
          <div className="topbar-actions">
            <button className="btn btn-ghost" onClick={handleRestart}>Restart</button>
          </div>
        )}
      </div>

      {showProgress && (
        <ProgressBar step={stepIndex} total={SCREENS.length - 1} label={STEP_LABELS[state.screen]} />
      )}

      {state.screen === 'welcome' && (
        <WelcomeScreen onStart={() => goto('mode')} />
      )}

      {state.screen === 'mode' && (
        <ModeSelection onSelect={handleModeSelect} />
      )}

      {state.screen === 'form' && state.mode === 'business' && (
        <BusinessForm onSubmit={handleFormSubmit} />
      )}

      {state.screen === 'form' && state.mode === 'personal' && (
        <PersonalBrandForm onSubmit={handleFormSubmit} />
      )}

      {state.screen === 'form' && state.mode === 'random' && (
        <RandomClientIntro profile={state.profile} onContinue={() => goto('step1')} />
      )}

      {state.screen === 'step1' && (
        <Step1Audience profile={state.profile} mode={state.mode} onNext={() => goto('step2')} />
      )}

      {state.screen === 'step2' && (
        <Step2Platforms
          profile={state.profile}
          mode={state.mode}
          selected={state.selectedPlatforms}
          setSelected={(updater) => setState(s => ({ ...s, selectedPlatforms: typeof updater === 'function' ? updater(s.selectedPlatforms) : updater }))}
          onNext={() => goto('step3')}
        />
      )}

      {state.screen === 'step3' && (
        <Step3Pillars
          profile={state.profile}
          mode={state.mode}
          selected={state.selectedPillars}
          setSelected={(updater) => setState(s => ({ ...s, selectedPillars: typeof updater === 'function' ? updater(s.selectedPillars) : updater }))}
          onNext={() => goto('step4')}
        />
      )}

      {state.screen === 'step4' && (
        <Step4Roadmap profile={state.profile} mode={state.mode} pillars={pillarObjs} onNext={handleStep4Next} />
      )}

      {state.screen === 'step5' && state.event && (
        <Step5Event
          event={state.event}
          choice={state.eventChoice}
          onChoose={(choice) => setState(s => ({ ...s, eventChoice: choice }))}
          onNext={() => goto('report')}
        />
      )}

      {state.screen === 'report' && (
        <GrowthReport state={state} onReplay={handleReplay} onRestart={handleRestart} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
