<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
:root{
  --accent:#c9a15a;
  --accent-dim:#8a6f3c;
  --accent-glow:rgba(201,161,90,0.35);
  --bg-deep:#141110;
  --bg-board:#1d1815;
  --bg-card:#26201b;
  --bg-card-2:#2e2620;
  --ink:#efe6d8;
  --ink-dim:#b8ab97;
  --ink-faint:#7d7263;
  --red-string:#a8342a;
  --good:#5b9e6f;
  --bad:#b8503f;
  --paper:#e9dfc9;
  --paper-ink:#2a2118;
  --font-display: 'Special Elite', 'Courier New', monospace;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-mono: 'Courier New', monospace;
}

/* Theme variants */
body.theme-orange{
  --accent:#c9a15a; --accent-dim:#8a6f3c; --accent-glow:rgba(201,161,90,0.35); --red-string:#a8342a;
}
body.theme-emerald{
  --accent:#4fae7e; --accent-dim:#2f7452; --accent-glow:rgba(79,174,126,0.32); --red-string:#c0392b;
}
body.theme-midnight{
  --accent:#5b8bd6; --accent-dim:#3a5c8f; --accent-glow:rgba(91,139,214,0.32); --red-string:#c0392b;
}
body.theme-purple{
  --accent:#9b6fd6; --accent-dim:#6a49a0; --accent-glow:rgba(155,111,214,0.32); --red-string:#c0392b;
}
body.theme-golden{
  --accent:#d8b23a; --accent-dim:#8f7420; --accent-glow:rgba(216,178,58,0.35); --red-string:#8a2e2a;
}

*{box-sizing:border-box; margin:0; padding:0;}

@font-face{
  font-family:'Special Elite';
  src:local('Courier New');
}

html,body{
  min-height:100vh;
  background:var(--bg-deep);
  color:var(--ink);
  font-family:var(--font-body);
  overflow-x:hidden;
}

body{
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.02), transparent 60%),
    repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 6px),
    linear-gradient(180deg, var(--bg-deep), #0e0c0a);
  min-height:100vh;
}

#root{min-height:100vh; position:relative;}

::selection{background:var(--accent); color:#1a1410;}

/* Scrollbar */
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--accent-dim); border-radius:6px;}

/* ===== Utility ===== */
.screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 80px;
  animation:fadeIn .6s ease both;
}
@keyframes fadeIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
@keyframes slideUp{from{opacity:0; transform:translateY(28px);} to{opacity:1; transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
}

.eyebrow{
  font-family:var(--font-mono);
  letter-spacing:0.35em;
  text-transform:uppercase;
  font-size:11px;
  color:var(--accent);
  opacity:0.85;
}

.btn{
  position:relative;
  overflow:hidden;
  font-family:var(--font-mono);
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-size:13px;
  font-weight:700;
  padding:14px 30px;
  background:var(--accent);
  color:#1a1410;
  border:none;
  border-radius:3px;
  cursor:pointer;
  box-shadow:0 4px 0 var(--accent-dim), 0 8px 18px rgba(0,0,0,0.4);
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 6px 0 var(--accent-dim), 0 12px 24px rgba(0,0,0,0.45);}
.btn:active{transform:translateY(2px); box-shadow:0 2px 0 var(--accent-dim), 0 4px 10px rgba(0,0,0,0.4);}
.btn:disabled{opacity:0.4; cursor:not-allowed; transform:none; box-shadow:0 4px 0 var(--accent-dim);}
.btn.ghost{
  background:transparent;
  color:var(--ink);
  border:1.5px solid var(--ink-faint);
  box-shadow:none;
}
.btn.ghost:hover{border-color:var(--accent); color:var(--accent); box-shadow:0 0 16px var(--accent-glow);}

.ripple{
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.5);
  transform:scale(0);
  animation:rippleAnim .55s ease-out;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(3.2); opacity:0;}}

.card-title-font{font-family:var(--font-display); letter-spacing:0.5px;}

/* ===== Theme Selector ===== */
.theme-select-wrap{
  max-width:900px;
  width:100%;
  text-align:center;
  margin-top:6vh;
}
.brand-mark{
  font-family:var(--font-display);
  font-size:clamp(38px,7vw,64px);
  color:var(--ink);
  text-shadow:0 0 30px var(--accent-glow);
  letter-spacing:1px;
  margin-top:18px;
}
.brand-sub{
  color:var(--ink-dim);
  font-size:16px;
  margin-top:10px;
  font-style:italic;
}
.magnifier{
  width:64px; height:64px; margin:0 auto;
  border:5px solid var(--accent);
  border-radius:50%;
  position:relative;
  box-shadow:0 0 24px var(--accent-glow), inset 0 0 14px rgba(0,0,0,0.5);
}
.magnifier::after{
  content:'';
  position:absolute;
  width:5px; height:34px;
  background:var(--accent);
  right:-16px; bottom:-24px;
  transform:rotate(45deg);
  border-radius:3px;
}

.theme-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
  margin-top:48px;
}
.theme-card{
  cursor:pointer;
  border:1.5px solid rgba(255,255,255,0.08);
  background:var(--bg-card);
  border-radius:8px;
  padding:24px 14px;
  transition:all .25s ease;
  position:relative;
}
.theme-card:hover{transform:translateY(-6px); box-shadow:0 14px 30px rgba(0,0,0,0.5);}
.theme-card .swatch{
  width:100%; height:52px;
  border-radius:6px;
  margin-bottom:14px;
  box-shadow:0 0 20px currentColor;
}
.theme-card .tname{font-family:var(--font-mono); font-size:13px; letter-spacing:0.05em; color:var(--ink);}
.theme-card.selected{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), 0 14px 30px rgba(0,0,0,0.5);}

/* ===== Case Assignment (folder open) ===== */
.folder-wrap{
  max-width:720px; width:100%;
  perspective:1400px;
  margin-top:4vh;
}
.folder{
  background:var(--paper);
  color:var(--paper-ink);
  border-radius:2px 10px 10px 10px;
  padding:38px 40px 44px;
  position:relative;
  box-shadow:0 22px 50px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.15);
  transform-origin:top center;
  animation:folderOpen .7s cubic-bezier(.2,.9,.3,1.2) both;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 26px);
}
@keyframes folderOpen{
  from{opacity:0; transform:rotateX(-35deg) translateY(-30px); }
  to{opacity:1; transform:rotateX(0) translateY(0);}
}
.folder::before{
  content:'CONFIDENTIAL';
  position:absolute;
  top:-16px; left:36px;
  background:var(--red-string);
  color:#fff;
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:0.2em;
  padding:5px 12px;
  transform:rotate(-3deg);
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}
.case-stamp{
  position:absolute; top:24px; right:30px;
  border:3px solid var(--red-string);
  color:var(--red-string);
  font-family:var(--font-mono);
  font-weight:700;
  padding:6px 12px;
  transform:rotate(8deg);
  font-size:12px;
  letter-spacing:0.1em;
  border-radius:4px;
  opacity:0.85;
}
.case-number{font-family:var(--font-mono); font-size:13px; letter-spacing:0.15em; color:var(--red-string); font-weight:700;}
.company-name{
  font-family:var(--font-display);
  font-size:clamp(26px,4vw,38px);
  margin-top:8px;
  border-bottom:2px dashed rgba(0,0,0,0.2);
  padding-bottom:14px;
}
.industry-tag{
  display:inline-block;
  margin-top:12px;
  background:rgba(0,0,0,0.08);
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-family:var(--font-mono);
  letter-spacing:0.05em;
}
.brief-block{margin-top:22px; line-height:1.7; font-size:15.5px;}
.brief-block h4{font-family:var(--font-mono); font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--red-string); margin-bottom:6px;}
.brief-block p{margin-bottom:16px;}
.objective-box{
  margin-top:6px;
  background:rgba(0,0,0,0.06);
  border-left:4px solid var(--red-string);
  padding:14px 18px;
  font-style:italic;
}
.folder-actions{margin-top:30px; display:flex; justify-content:flex-end;}

/* ===== Investigation Board ===== */
.board-screen{max-width:1300px; width:100%;}
.board-header{
  width:100%;
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;
  margin-bottom:26px;
}
.board-title{font-family:var(--font-display); font-size:26px;}
.board-sub{color:var(--ink-dim); font-size:13px; margin-top:4px;}

.progress-wrap{
  width:100%;
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  height:14px;
  overflow:hidden;
  margin:10px 0 28px;
  position:relative;
  border:1px solid rgba(255,255,255,0.08);
}
.progress-bar-fill{
  height:100%;
  background:linear-gradient(90deg, var(--accent-dim), var(--accent));
  border-radius:20px;
  transition:width .5s cubic-bezier(.3,.8,.3,1);
  box-shadow:0 0 14px var(--accent-glow);
  position:relative;
}
.progress-label{
  position:absolute; right:10px; top:-22px;
  font-family:var(--font-mono); font-size:11px; color:var(--ink-dim);
}

.corkboard{
  width:100%;
  min-height:520px;
  background:
    radial-gradient(circle at 10% 20%, rgba(0,0,0,0.25), transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(0,0,0,0.25), transparent 40%),
    #4a3624;
  background-image:
    repeating-radial-gradient(circle at 30% 30%, rgba(0,0,0,0.08) 0, transparent 2px),
    linear-gradient(#4a3624,#3d2c1d);
  border-radius:10px;
  border:10px solid #2b2018;
  box-shadow:inset 0 0 60px rgba(0,0,0,0.6), 0 20px 40px rgba(0,0,0,0.5);
  position:relative;
  padding:30px;
  display:flex;
  flex-wrap:wrap;
  gap:22px;
  align-content:flex-start;
}
.corkboard::before{
  content:'';
  position:absolute; inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:6px 6px;
  border-radius:6px;
  pointer-events:none;
}

.evidence-card{
  width:230px;
  background:var(--paper);
  color:var(--paper-ink);
  border-radius:2px;
  padding:16px 16px 20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
  position:relative;
  cursor:grab;
  user-select:none;
  transform:rotate(var(--rot,0deg));
  transition:box-shadow .2s ease, transform .2s ease;
  font-size:13px;
  animation:slideUp .5s ease both;
}
.evidence-card:hover{box-shadow:0 16px 30px rgba(0,0,0,0.55); z-index:5;}
.evidence-card.dragging{cursor:grabbing; z-index:50; box-shadow:0 24px 40px rgba(0,0,0,0.6); transform:rotate(0deg) scale(1.04);}
.pin{
  position:absolute; top:-10px; left:50%; transform:translateX(-50%);
  width:16px; height:16px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #ff8a7a, var(--red-string));
  box-shadow:0 3px 6px rgba(0,0,0,0.5);
  animation:pinBounce .5s ease both;
}
@keyframes pinBounce{0%{transform:translateX(-50%) translateY(-20px) scale(0.5); opacity:0;} 60%{transform:translateX(-50%) translateY(3px) scale(1.1);} 100%{transform:translateX(-50%) translateY(0) scale(1); opacity:1;}}
.evidence-label{font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--red-string); font-weight:700; margin-bottom:6px;}
.evidence-title{font-family:var(--font-display); font-size:15px; margin-bottom:8px; line-height:1.3;}
.evidence-body{line-height:1.5; font-size:12.5px;}
.evidence-body .metric-row{display:flex; justify-content:space-between; margin-bottom:4px;}
.evidence-body .metric-row b{color:var(--red-string);}

.board-footer{
  width:100%;
  display:flex; justify-content:center; margin-top:32px;
}

/* ===== Clue Reveal ===== */
.clue-screen{max-width:820px; width:100%;}
.clue-card{
  width:100%;
  background:var(--bg-card);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:34px 36px;
  margin-bottom:20px;
  box-shadow:0 14px 30px rgba(0,0,0,0.4);
  animation:slideUp .5s ease both;
  position:relative;
  overflow:hidden;
}
.clue-card::before{
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:5px;
  background:var(--accent);
  box-shadow:0 0 14px var(--accent-glow);
}
.clue-index{font-family:var(--font-mono); font-size:11px; color:var(--accent); letter-spacing:0.2em;}
.clue-text{font-family:var(--font-display); font-size:19px; margin-top:8px; line-height:1.5;}
.clue-actions{display:flex; justify-content:center; margin-top:8px; gap:14px;}

/* ===== Solve Case ===== */
.solve-screen{max-width:900px; width:100%;}
.suspects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  width:100%;
  margin-top:26px;
}
.suspect-card{
  background:var(--bg-card);
  border:2px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:24px;
  cursor:pointer;
  transition:all .2s ease;
  text-align:left;
}
.suspect-card:hover{border-color:var(--accent); box-shadow:0 0 20px var(--accent-glow); transform:translateY(-4px);}
.suspect-card.chosen{border-color:var(--accent); background:var(--bg-card-2);}
.suspect-card.correct{border-color:var(--good); box-shadow:0 0 24px rgba(91,158,111,0.4);}
.suspect-card.incorrect{border-color:var(--bad); box-shadow:0 0 24px rgba(184,80,63,0.35); opacity:0.75;}
.suspect-letter{
  font-family:var(--font-mono); font-size:12px; color:var(--accent); letter-spacing:0.1em;
}
.suspect-name{font-family:var(--font-display); font-size:18px; margin-top:6px;}

.verdict-box{
  width:100%; margin-top:30px;
  background:var(--bg-card-2);
  border-radius:10px;
  padding:28px 30px;
  animation:slideUp .5s ease both;
  border:1px solid rgba(255,255,255,0.08);
}
.verdict-title{font-family:var(--font-mono); font-size:12px; letter-spacing:0.2em; color:var(--accent);}
.verdict-answer{font-family:var(--font-display); font-size:24px; margin:10px 0 16px;}
.verdict-section{margin-bottom:16px;}
.verdict-section h5{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.15em; color:var(--ink-dim); margin-bottom:6px;}
.verdict-section ul{padding-left:20px; line-height:1.7;}
.verdict-section p{line-height:1.7;}

/* ===== Case Closed ===== */
.closed-screen{max-width:760px; width:100%; text-align:center;}
.stamp-wrap{position:relative; margin:30px 0 10px; height:170px; display:flex; align-items:center; justify-content:center;}
.stamp{
  font-family:var(--font-display);
  font-size:clamp(38px,7vw,58px);
  color:var(--red-string);
  border:6px solid var(--red-string);
  padding:10px 30px;
  border-radius:10px;
  transform:rotate(-10deg) scale(2.2);
  opacity:0;
  letter-spacing:0.1em;
  animation:stampSlam .6s cubic-bezier(.2,.9,.2,1.1) .2s forwards;
  box-shadow:0 0 0 rgba(184,52,42,0);
}
@keyframes stampSlam{
  0%{opacity:0; transform:rotate(-10deg) scale(2.6);}
  60%{opacity:1; transform:rotate(-10deg) scale(0.94); box-shadow:0 0 40px rgba(184,52,42,0.5);}
  80%{transform:rotate(-10deg) scale(1.05);}
  100%{opacity:0.95; transform:rotate(-10deg) scale(1); box-shadow:0 0 20px rgba(184,52,42,0.3);}
}
.score-panel{
  display:flex; justify-content:center; gap:30px; flex-wrap:wrap;
  margin-top:20px;
}
.score-stat{
  background:var(--bg-card);
  border-radius:10px;
  padding:20px 26px;
  min-width:140px;
  border:1px solid rgba(255,255,255,0.08);
}
.score-stat .big{font-family:var(--font-display); font-size:30px; color:var(--accent);}
.score-stat .lbl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; color:var(--ink-dim); text-transform:uppercase; margin-top:4px;}
.stars{font-size:28px; letter-spacing:4px; margin-top:6px; color:var(--accent);}
.badge-pill{
  display:inline-block; margin-top:18px; padding:8px 20px;
  border:1.5px solid var(--accent); border-radius:30px;
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.1em; color:var(--accent);
}

/* ===== Learning Report ===== */
.report-screen{max-width:820px; width:100%;}
.report-section{
  width:100%;
  background:var(--bg-card);
  border-radius:10px;
  padding:26px 30px;
  margin-bottom:18px;
  border-left:4px solid var(--accent);
  animation:slideUp .5s ease both;
}
.report-section h4{font-family:var(--font-mono); font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:10px;}
.report-section p, .report-section li{line-height:1.75; color:var(--ink);}
.report-section ul{padding-left:20px;}

/* ===== Charts ===== */
.charts-wrap{
  width:100%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin:24px 0;
}
.chart-card{
  background:var(--bg-card);
  border-radius:10px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.08);
}
.chart-title{font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:14px;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.bar-label{width:90px; font-size:11px; font-family:var(--font-mono); color:var(--ink-dim); flex-shrink:0;}
.bar-track{flex:1; background:rgba(255,255,255,0.06); border-radius:6px; height:16px; overflow:hidden;}
.bar-fill{
  height:100%; background:linear-gradient(90deg, var(--accent-dim), var(--accent));
  width:0%;
  border-radius:6px;
  transition:width 1s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 0 10px var(--accent-glow);
}
.bar-value{width:56px; font-family:var(--font-mono); font-size:11px; text-align:right; color:var(--ink);}

.donut-wrap{display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
.donut{width:140px; height:140px; border-radius:50%; flex-shrink:0;
  background:conic-gradient(var(--accent) 0deg, var(--accent) 0deg);
  position:relative;
  transition:background 1.2s ease;
}
.donut::after{
  content:''; position:absolute; inset:14px; border-radius:50%; background:var(--bg-card);
}
.donut-legend{font-size:11px; font-family:var(--font-mono); line-height:2;}
.legend-dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px;}

/* ===== Certificate ===== */
.cert-screen{max-width:820px; width:100%;}
.certificate{
  width:100%;
  background:var(--paper);
  color:var(--paper-ink);
  border-radius:6px;
  padding:50px 50px 40px;
  position:relative;
  border:10px double var(--accent-dim);
  box-shadow:0 30px 60px rgba(0,0,0,0.55);
  text-align:center;
  animation:slideUp .6s ease both;
}
.cert-eyebrow{font-family:var(--font-mono); letter-spacing:0.3em; font-size:11px; color:var(--red-string);}
.cert-title{font-family:var(--font-display); font-size:clamp(28px,5vw,40px); margin:14px 0 6px;}
.cert-sub{font-style:italic; color:#5a4c38; margin-bottom:30px;}
.cert-stats{display:flex; justify-content:center; gap:40px; flex-wrap:wrap; margin:26px 0;}
.cert-stat .big{font-family:var(--font-display); font-size:32px; color:var(--red-string);}
.cert-stat .lbl{font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#5a4c38;}
.cert-lessons{text-align:left; max-width:560px; margin:20px auto 0; line-height:1.8;}
.cert-lessons h5{font-family:var(--font-mono); font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--red-string); margin-bottom:8px;}
.cert-seal{
  width:90px; height:90px; border-radius:50%;
  border:3px solid var(--red-string);
  display:flex; align-items:center; justify-content:center;
  margin:26px auto 0;
  font-family:var(--font-mono); font-size:10px; color:var(--red-string);
  text-align:center; line-height:1.3;
  transform:rotate(-8deg);
}

.actions-row{display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:30px;}

.top-nav{
  position:fixed; top:16px; right:20px; display:flex; gap:10px; z-index:100;
}
.icon-btn{
  background:var(--bg-card);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--ink-dim);
  font-family:var(--font-mono);
  font-size:11px;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  letter-spacing:0.05em;
}
.icon-btn:hover{color:var(--accent); border-color:var(--accent);}

.stats-strip{
  position:fixed; top:16px; left:20px; z-index:100;
  font-family:var(--font-mono); font-size:11px; color:var(--ink-dim);
  background:var(--bg-card); padding:8px 14px; border-radius:6px; border:1px solid rgba(255,255,255,0.1);
}
.stats-strip b{color:var(--accent);}

@media (max-width:640px){
  .top-nav, .stats-strip{position:static; margin-bottom:14px;}
  .folder{padding:26px 20px 30px;}
  .evidence-card{width:100%; max-width:280px;}
  .cert-stats{gap:20px;}
}

const state = {
  theme:'orange',
  screen:'theme', // theme, assignment, board, clues, solve, closed, report, certificate

  history:[], // {company, correct}
  skillTally:{ "Wrong Audience Targeting":0, "Weak Creative":0, "Poor Platform Selection":0, "Budget Misallocation":0, "No Major Mistake":0 },
  usedCaseIdx:new Set(),
};

const SUSPECTS = ["Wrong Audience Targeting","Weak Creative","Poor Platform Selection","Budget Misallocation"];

function pickRandomCase(){
  let pool = CASES.map((c,i)=>i).filter(i=>!state.usedCaseIdx.has(i));
  if(pool.length===0){ state.usedCaseIdx.clear(); pool = CASES.map((c,i)=>i); }
  const idx = pool[Math.floor(Math.random()*pool.length)];
  state.usedCaseIdx.add(idx);
  return { ...CASES[idx], _idx: idx };
}

/* ---------- HELPERS ---------- */
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k.startsWith('on') && typeof attrs[k]==='function') e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c===null||c===undefined) return;
    if(typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function addRipple(e, btn){
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className='ripple';
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size+'px';
  r.style.left = (e.clientX - rect.left - size/2)+'px';
  r.style.top = (e.clientY - rect.top - size/2)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(), 600);
}

function makeBtn(label, cls, handler){
  const b = el('button', { class:'btn '+(cls||'') }, label);
  b.addEventListener('click', (e)=>{ addRipple(e,b); handler(e); });
  return b;
}

function caseNumberFor(idx){ return 'MD-'+String(1000+idx).slice(1); }

function parseNum(str){
  if(typeof str !== 'string') return 0;
  const m = str.replace(/[^0-9.]/g,'');
  return parseFloat(m)||0;
}
function metricPercent(metricKey, val){
  // heuristic scaling for bar charts
  const n = parseNum(val);
  switch(metricKey){
    case 'reach': return Math.min(100, (n/3100000)*100 || (n/3.1)); // handles "1.2M" parsed weirdly; fallback below
    case 'ctr': return Math.min(100, (n/4)*100);
    case 'engagement': return Math.min(100, (n/6)*100);
    case 'conversions': return Math.min(100, (n/1200)*100);
    case 'sales': return Math.min(100, (n/1500000)*100);
    default: return 50;
  }
}
function reachToNumber(str){
  if(str.includes('M')) return parseNum(str)*1000000;
  if(str.includes('K')) return parseNum(str)*1000;
  return parseNum(str);
}

  root.innerHTML='';

    root.appendChild(renderTopNav());
  }
  switch(state.screen){
    case 'theme': root.appendChild(renderThemeSelect()); break;
    case 'assignment': root.appendChild(renderAssignment()); break;
    case 'board': root.appendChild(renderBoard()); break;
    case 'clues': root.appendChild(renderClues()); break;
    case 'solve': root.appendChild(renderSolve()); break;
    case 'closed': root.appendChild(renderClosed()); break;
    case 'report': root.appendChild(renderReport()); break;
    case 'certificate': root.appendChild(renderCertificate()); break;
  }
}

function enableDragging(board){
  let activeCard=null, offsetX=0, offsetY=0, startedAbs=false;
  board.querySelectorAll('.evidence-card').forEach(card=>{
    card.addEventListener('mousedown', (e)=>{
      activeCard = card;
      card.classList.add('dragging');
      const rect = card.getBoundingClientRect();
      const boardRect = board.getBoundingClientRect();
      if(!startedAbs){
        // convert to absolute positioning within board on first drag
      }
      card.style.position='absolute';
      card.style.left = (rect.left-boardRect.left)+'px';
      card.style.top = (rect.top-boardRect.top)+'px';
      card.style.margin='0';
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      e.preventDefault();
    });
  });
  document.addEventListener('mousemove', (e)=>{
    if(!activeCard) return;
    const boardRect = board.getBoundingClientRect();
    let x = e.clientX - boardRect.left - offsetX;
    let y = e.clientY - boardRect.top - offsetY;
    x = Math.max(0, Math.min(x, board.clientWidth-230));
    y = Math.max(0, Math.min(y, board.clientHeight-60));
    activeCard.style.left = x+'px';
    activeCard.style.top = y+'px';
  });
  document.addEventListener('mouseup', ()=>{
    if(activeCard) activeCard.classList.remove('dragging');
    activeCard = null;
  });
  // touch support
  board.querySelectorAll('.evidence-card').forEach(card=>{
    card.addEventListener('touchstart', (e)=>{
      activeCard = card;
      card.classList.add('dragging');
      const rect = card.getBoundingClientRect();
      const boardRect = board.getBoundingClientRect();
      card.style.position='absolute';
      card.style.left = (rect.left-boardRect.left)+'px';
      card.style.top = (rect.top-boardRect.top)+'px';
      card.style.margin='0';
      const t = e.touches[0];
      offsetX = t.clientX - rect.left;
      offsetY = t.clientY - rect.top;
    }, {passive:true});
  });
  document.addEventListener('touchmove', (e)=>{
    if(!activeCard) return;
    const t = e.touches[0];
    const boardRect = board.getBoundingClientRect();
    let x = t.clientX - boardRect.left - offsetX;
    let y = t.clientY - boardRect.top - offsetY;
    x = Math.max(0, Math.min(x, board.clientWidth-230));
    y = Math.max(0, Math.min(y, board.clientHeight-60));
    activeCard.style.left = x+'px';
    activeCard.style.top = y+'px';
  }, {passive:true});
  document.addEventListener('touchend', ()=>{
    if(activeCard) activeCard.classList.remove('dragging');
    activeCard=null;
  });
}

/* ---------- SCREEN: SOLVE ---------- */
function renderSolve(){
  const c = state.currentCase;
  const s = el('div', { class:'screen solve-screen' });
  s.appendChild(el('div',{class:'board-title'}, 'Solve the Case'));
  s.appendChild(el('div',{class:'board-sub'}, 'Based on the evidence, what was the primary marketing mistake?'));

  const grid = el('div',{class:'suspects-grid'});
  const letters = ['A','B','C','D'];
  const correctAnswer = c.mistake || "No Major Mistake";
  const options = c.mistake ? SUSPECTS : shuffle([...SUSPECTS, "No Major Mistake"]).slice(0,4).includes(correctAnswer) ? shuffle([...SUSPECTS]).slice(0,3).concat(["No Major Mistake"]) : SUSPECTS;
  const finalOptions = c.mistake ? SUSPECTS : shuffleOnce(c, SUSPECTS, correctAnswer);

  finalOptions.forEach((opt, i)=>{
    const card = el('div',{class:'suspect-card'});
    card.appendChild(el('div',{class:'suspect-letter'}, 'SUSPECT '+letters[i]));
    card.appendChild(el('div',{class:'suspect-name card-title-font'}, opt));
    card.addEventListener('click', ()=>{
      if(state.answered) return;
      state.answered = true;
      state.selectedSuspect = opt;
      state.totalAnswered++;
      const isCorrect = opt === correctAnswer;
      if(isCorrect) state.correctAnswers++;
      state.skillTally[correctAnswer] = (state.skillTally[correctAnswer]||0);
      state.history.push({ company:c.company, correct:isCorrect, chosen:opt, actual:correctAnswer });
      render();
    });
    grid.appendChild(card);
  });
  s.appendChild(grid);

  if(state.answered){
    const correctAns = correctAnswer;
    const isCorrect = state.selectedSuspect === correctAns;
    grid.querySelectorAll('.suspect-card').forEach(card=>{
      const name = card.querySelector('.suspect-name').textContent;
      if(name === correctAns) card.classList.add('correct');
      else if(name === state.selectedSuspect) card.classList.add('incorrect');
    });

    const verdict = el('div',{class:'verdict-box'});
    verdict.appendChild(el('div',{class:'verdict-title'}, isCorrect ? 'CORRECT DEDUCTION' : 'CASE REVEALED'));
    verdict.appendChild(el('div',{class:'verdict-answer'}, correctAns));

    const sec1 = el('div',{class:'verdict-section'});
    sec1.appendChild(el('h5',{},'Expert Explanation'));
    sec1.appendChild(el('p',{}, c.explanation));
    verdict.appendChild(sec1);

    const sec2 = el('div',{class:'verdict-section'});
    sec2.appendChild(el('h5',{},'Supporting Evidence'));
    const ul = el('ul',{});
    c.clues.forEach(cl=> ul.appendChild(el('li',{}, cl)));
    sec2.appendChild(ul);
    verdict.appendChild(sec2);

    const btnWrap = el('div',{style:'display:flex; justify-content:center; margin-top:10px;'});
    btnWrap.appendChild(makeBtn('Close the Case →', '', ()=>{
      state.casesSolved++;
      state.screen='closed'; render();
    }));
    verdict.appendChild(btnWrap);

    s.appendChild(verdict);
  }
  return s;
}

function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }
function shuffleOnce(c, suspects, correctAnswer){
  // build 4 options including the "No Major Mistake" correct answer, mixed with 3 distractors
  const distractors = shuffle(suspects).slice(0,3);
  return shuffle([...distractors, correctAnswer]);
}

  const sec1 = el('div',{class:'report-section'});
  sec1.appendChild(el('h4',{},'What Happened'));
  sec1.appendChild(el('p',{}, `${c.company} ran a campaign to ${c.objective.toLowerCase()}, targeting ${c.audience.toLowerCase()}. The results fell short of expectations, prompting this investigation.`));
  s.appendChild(sec1);

  const sec2 = el('div',{class:'report-section'});
  sec2.appendChild(el('h4',{},'Primary Mistake'));
  sec2.appendChild(el('p',{}, c.mistake || 'No major mistake — this campaign was fundamentally well-executed.'));
  s.appendChild(sec2);

  const sec3 = el('div',{class:'report-section'});
  sec3.appendChild(el('h4',{},'Supporting Evidence'));
  const ul = el('ul',{});
  c.clues.forEach(cl=> ul.appendChild(el('li',{}, cl)));
  sec3.appendChild(ul);
  s.appendChild(sec3);

  const sec4 = el('div',{class:'report-section'});
  sec4.appendChild(el('h4',{},'Suggested Improvements'));
  const ul2 = el('ul',{});
  c.improvements.forEach(im=> ul2.appendChild(el('li',{}, im)));
  sec4.appendChild(ul2);
  s.appendChild(sec4);

  // Charts
  s.appendChild(el('div',{class:'report-section'},[
    el('h4',{},'Performance Charts'),
    renderCharts(c)
  ]));

  const sec5 = el('div',{class:'report-section'});
  sec5.appendChild(el('h4',{},'Real-World Takeaway'));
  sec5.appendChild(el('p',{}, takeawayFor(c.mistake)));
  s.appendChild(sec5);

  const actions = el('div',{class:'actions-row'});
  actions.appendChild(makeBtn('Investigate Another Case', '', ()=>{
    state.currentCase = pickRandomCase();
    state.clueIndex=0; state.selectedSuspect=null; state.answered=false;
    state.screen='assignment'; render();
  }));
  actions.appendChild(makeBtn('View Certificate', 'ghost', ()=>{ state.screen='certificate'; render(); }));
  s.appendChild(actions);
  return s;
}

function takeawayFor(mistake){
  const map = {
    "Wrong Audience Targeting":"Even great creative and generous budgets fail if they reach the wrong people. Always validate that your channel's actual user base matches your stated target audience before scaling spend.",
    "Weak Creative":"Reach and channel selection can be perfect, but if the creative doesn't clearly communicate real product benefits, interested viewers won't convert. Clarity beats polish.",
    "Poor Platform Selection":"Every platform has a demographic personality. Matching the platform's actual audience to your buyer persona matters more than the platform's popularity or prestige.",
    "Budget Misallocation":"Spend should follow proven performance signals, not assumptions about which channel 'feels' premium or exciting. Track what's converting and fund it more.",
    "No Major Mistake":"Not every underperforming metric points to a marketing failure — sometimes the issue is operational, or the campaign is actually working as intended within realistic expectations."
  };
  return map[mistake] || map["No Major Mistake"];
}

function renderCharts(c){
  const wrap = el('div',{class:'charts-wrap'});

  // Bar chart: metrics
  const barCard = el('div',{class:'chart-card'});
  barCard.appendChild(el('div',{class:'chart-title'},'Campaign Metrics'));
  const metricKeys = [['reach','Reach'],['ctr','CTR'],['engagement','Engagement'],['conversions','Conversions']];
  metricKeys.forEach(([key,label])=>{
    const val = c.metrics[key];
    const row = el('div',{class:'bar-row'});
    row.appendChild(el('div',{class:'bar-label'}, label));
    const track = el('div',{class:'bar-track'});
    const fill = el('div',{class:'bar-fill'});
    track.appendChild(fill);
    row.appendChild(track);
    row.appendChild(el('div',{class:'bar-value'}, val));
    barCard.appendChild(row);
    requestAnimationFrame(()=>{
      let pct;
      if(key==='reach') pct = Math.min(100,(reachToNumber(val)/3200000)*100);
      else pct = metricPercent(key, val);
      setTimeout(()=>{ fill.style.width = Math.max(6,pct)+'%'; }, 60);
    });
  });
  wrap.appendChild(barCard);

  // Donut chart: budget allocation
  const donutCard = el('div',{class:'chart-card'});
  donutCard.appendChild(el('div',{class:'chart-title'},'Budget Allocation'));
  const donutWrap = el('div',{class:'donut-wrap'});
  const donut = el('div',{class:'donut'});
  donutWrap.appendChild(donut);
  const legend = el('div',{class:'donut-legend'});
  const entries = Object.entries(c.budget);
  const total = entries.reduce((a,[,v])=>a+v,0);
  const colors = ['var(--accent)','#8a6f3c','#5a4c38','#3a2f22','#c47a4a'];
  let acc=0;
  const gradientParts=[];
  entries.forEach(([k,v],i)=>{
    const startPct = (acc/total)*360;
    acc += v;
    const endPct = (acc/total)*360;
    gradientParts.push(`${colors[i%colors.length]} ${startPct}deg ${endPct}deg`);
    legend.appendChild(el('div',{},[
      el('span',{class:'legend-dot', style:'background:'+colors[i%colors.length]}),
      k+': '+Math.round((v/total)*100)+'%'
    ]));
  });
  donutWrap.appendChild(legend);
  donutCard.appendChild(donutWrap);
  wrap.appendChild(donutCard);
  requestAnimationFrame(()=>{
    setTimeout(()=>{ donut.style.background = 'conic-gradient('+gradientParts.join(',')+')'; }, 80);
  });

  // Sales bar
  const salesCard = el('div',{class:'chart-card'});
  salesCard.appendChild(el('div',{class:'chart-title'},'Sales Outcome'));
  const salesRow = el('div',{class:'bar-row'});
  salesRow.appendChild(el('div',{class:'bar-label'},'Sales'));
  const strack = el('div',{class:'bar-track'});
  const sfill = el('div',{class:'bar-fill'});
  strack.appendChild(sfill);
  salesRow.appendChild(strack);
  salesRow.appendChild(el('div',{class:'bar-value'}, c.metrics.sales));
  salesCard.appendChild(salesRow);
  requestAnimationFrame(()=>{
    const pct = metricPercent('sales', c.metrics.sales);
    setTimeout(()=>{ sfill.style.width = Math.max(6,pct)+'%'; }, 100);
  });
  wrap.appendChild(salesCard);

  return wrap;
}

/* ---------- SCREEN: CERTIFICATE ---------- */
function renderCertificate(){
  const s = el('div', { class:'screen cert-screen' });
  const accuracy = state.totalAnswered ? Math.round((state.correctAnswers/state.totalAnswered)*100) : 0;

  // best/weakest skill based on history of mistake categories encountered vs correctness
  const catCorrect = {};
  const catTotal = {};
  state.history.forEach(h=>{
    catTotal[h.actual] = (catTotal[h.actual]||0)+1;
    if(h.correct) catCorrect[h.actual] = (catCorrect[h.actual]||0)+1;
  });
  let best=null, worst=null, bestRate=-1, worstRate=2;
  Object.keys(catTotal).forEach(k=>{
    const rate = (catCorrect[k]||0)/catTotal[k];
    if(rate>bestRate){bestRate=rate; best=k;}
    if(rate<worstRate){worstRate=rate; worst=k;}
  });

  const cert = el('div',{class:'certificate'});
  cert.appendChild(el('div',{class:'cert-eyebrow'}, 'MARKETING DETECTIVE AGENCY'));
  cert.appendChild(el('div',{class:'cert-title'}, 'Certificate of Investigation'));
  cert.appendChild(el('div',{class:'cert-sub'}, 'Awarded for diligent marketing casework and analytical rigor'));

  const stats = el('div',{class:'cert-stats'});
  stats.appendChild(el('div',{class:'cert-stat'},[el('div',{class:'big'}, accuracy+'%'), el('div',{class:'lbl'},'Overall Accuracy')]));
  stats.appendChild(el('div',{class:'cert-stat'},[el('div',{class:'big'}, String(state.casesSolved)), el('div',{class:'lbl'},'Cases Solved')]));
  cert.appendChild(stats);

  const lessons = el('div',{class:'cert-lessons'});
  lessons.appendChild(el('h5',{},'Best Skill'));
  lessons.appendChild(el('p',{}, best || 'Not enough data yet'));
  lessons.appendChild(el('h5',{style:'margin-top:14px;'},'Weakest Skill'));
  lessons.appendChild(el('p',{}, worst || 'Not enough data yet'));
  lessons.appendChild(el('h5',{style:'margin-top:14px;'},'Three Marketing Lessons'));
  const ul = el('ul',{});
  [
    'Audience match matters more than budget size — the right people beat the biggest spend.',
    'Creative must translate attention into clear, actionable understanding of the product.',
    'Every platform has its own demographic personality; choose channels the buyer actually uses.'
  ].forEach(l=> ul.appendChild(el('li',{style:'margin-bottom:6px;'}, l)));
  lessons.appendChild(ul);
  cert.appendChild(lessons);

  cert.appendChild(el('div',{class:'cert-seal'}, 'OFFICIAL\nSEAL'));

  s.appendChild(cert);

  const actions = el('div',{class:'actions-row'});
  actions.appendChild(makeBtn('Replay Investigation', '', ()=>{
    state.currentCase = pickRandomCase();
    state.clueIndex=0; state.selectedSuspect=null; state.answered=false;
    state.screen='assignment'; render();
  }));
  s.appendChild(actions);
  return s;
}

/* ---------- INIT ---------- */
render();
</script>
