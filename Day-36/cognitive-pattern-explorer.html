<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Pattern Explorer</title>
<style>
  :root{
    --bg-deep:#0c1018;
    --bg-panel:#141c2b;
    --bg-panel-2:#1a2438;
    --line:rgba(255,255,255,0.08);
    --ember:#ff8a5b;
    --ember-soft:rgba(255,138,91,0.16);
    --teal:#5eead4;
    --teal-soft:rgba(94,234,212,0.14);
    --violet:#a78bfa;
    --text-hi:#eef1f7;
    --text-mid:#aab2c5;
    --text-low:#6b7386;
    --radius:18px;
    --radius-sm:10px;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
    --dur:0.5s;
    --ease:cubic-bezier(.22,1,.36,1);
    font-size:16px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 15% -10%, rgba(255,138,91,0.10), transparent 60%),
      radial-gradient(1000px 800px at 100% 110%, rgba(94,234,212,0.09), transparent 60%),
      var(--bg-deep);
    color:var(--text-hi);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  .display{ font-family:Georgia,"Iowan Old Style","Palatino Linotype",Palatino,serif; letter-spacing:-0.01em; }
  .mono{ font-family:"JetBrains Mono","SF Mono",Consolas,"Courier New",monospace; }

  a,button{font-family:inherit;}
  :focus-visible{ outline:2px solid var(--teal); outline-offset:3px; border-radius:6px; }

  /* ambient particles */
  #particles{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .particle{position:absolute; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), rgba(255,255,255,0) 70%); opacity:0.5; animation:float 18s ease-in-out infinite;}
  @keyframes float{
    0%{ transform:translateY(0) translateX(0); }
    50%{ transform:translateY(-60px) translateX(30px); }
    100%{ transform:translateY(0) translateX(0); }
  }

  /* signature: pulse / ekg thread */
  .pulse-wrap{position:sticky; top:0; z-index:20; width:100%; padding:0; background:linear-gradient(180deg, rgba(12,16,24,0.92), rgba(12,16,24,0.55) 70%, transparent);}
  .pulse-svg{display:block; width:100%; height:46px;}
  .pulse-line{
    fill:none; stroke:url(#pulseGrad); stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:1400; stroke-dashoffset:1400;
    animation:pulseDraw 3.4s var(--ease) infinite;
    filter:drop-shadow(0 0 6px rgba(255,138,91,0.45));
  }
  @keyframes pulseDraw{
    0%{ stroke-dashoffset:1400; }
    60%{ stroke-dashoffset:0; }
    100%{ stroke-dashoffset:-1400; }
  }

  #app{ position:relative; z-index:1; max-width:900px; margin:0 auto; padding:0 20px 80px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 4px 6px; }
  .badge-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .tagpill{
    font-size:0.72rem; letter-spacing:0.06em; text-transform:uppercase; padding:5px 11px;
    border-radius:999px; border:1px solid var(--line); color:var(--text-mid);
    background:rgba(255,255,255,0.03);
  }
  .tagpill.stress{ color:var(--ember); border-color:rgba(255,138,91,0.35); background:var(--ember-soft); }
  .tagpill.mode-diff{ color:var(--teal); border-color:rgba(94,234,212,0.3); background:var(--teal-soft); }

  .progress-track{ height:6px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; margin:18px 0 6px; }
  .progress-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg, var(--ember), var(--violet), var(--teal)); transition:width 0.6s var(--ease); }
  .progress-label{ font-size:0.75rem; color:var(--text-low); display:flex; justify-content:space-between; margin-bottom:8px; }

  .screen{ animation:screenIn var(--dur) var(--ease); }
  @keyframes screenIn{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:translateY(0);} }
  .screen.leaving{ animation:screenOut 0.35s var(--ease) forwards; }
  @keyframes screenOut{ to{ opacity:0; transform:translateY(-10px);} }

  .card{
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); backdrop-filter:blur(6px);
    padding:28px;
  }

  .hero{ text-align:center; padding:56px 12px 30px; }
  .hero-eyebrow{ font-size:0.78rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--ember); margin-bottom:14px; }
  .hero h1{ font-size:clamp(2.1rem, 5vw, 3.1rem); margin:0 0 14px; line-height:1.08; }
  .hero p.sub{ color:var(--text-mid); font-size:1.05rem; max-width:560px; margin:0 auto 30px; line-height:1.6; }

  .btn{
    appearance:none; border:none; cursor:pointer; font-weight:600; font-size:0.98rem;
    padding:14px 28px; border-radius:999px; color:#0c1018;
    background:linear-gradient(135deg, var(--teal), #8be9d9);
    box-shadow:0 10px 30px rgba(94,234,212,0.25);
    transition:transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 14px 34px rgba(94,234,212,0.35); }
  .btn:active{ transform:translateY(0px) scale(0.98); }
  .btn.ghost{
    background:transparent; color:var(--text-hi); border:1px solid var(--line);
    box-shadow:none;
  }
  .btn.ghost:hover{ border-color:var(--teal); color:var(--teal); }
  .btn.warm{ background:linear-gradient(135deg, var(--ember), #ffb088); box-shadow:0 10px 30px rgba(255,138,91,0.25); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }

  .btn-row{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

  .chapter-head{ margin-bottom:22px; }
  .chapter-eyebrow{ font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--teal); margin-bottom:8px; }
  .chapter-head h2{ margin:0 0 8px; font-size:1.7rem; }
  .chapter-head p{ color:var(--text-mid); margin:0; line-height:1.55; }

  /* timer / urgency */
  .timer-wrap{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .timer-ring{ position:relative; width:44px; height:44px; flex:0 0 auto; }
  .timer-ring svg{ transform:rotate(-90deg); width:44px; height:44px; }
  .timer-ring circle{ fill:none; stroke-width:4; }
  .timer-bg{ stroke:rgba(255,255,255,0.08); }
  .timer-fg{ stroke:var(--ember); stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
  .timer-num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:0.72rem; color:var(--ember); }
  .urgency-text{ font-size:0.82rem; color:var(--ember); }

  .scenario-situation{ font-size:1.12rem; line-height:1.65; margin-bottom:8px; }
  .scenario-hint{ font-size:0.85rem; color:var(--text-low); margin-bottom:20px; font-style:italic; }

  .option-list{ display:flex; flex-direction:column; gap:12px; }
  .option-btn{
    text-align:left; padding:16px 18px; border-radius:var(--radius-sm);
    background:rgba(255,255,255,0.02); border:1px solid var(--line); color:var(--text-hi);
    cursor:pointer; transition:all 0.2s var(--ease); font-size:0.98rem; line-height:1.5;
  }
  .option-btn:hover:not(:disabled){ border-color:var(--teal); background:rgba(94,234,212,0.06); transform:translateX(3px); }
  .option-btn.selected{ border-color:var(--teal); background:var(--teal-soft); }
  .option-btn:disabled{ cursor:default; }
  .option-btn .opt-letter{ display:inline-block; width:22px; height:22px; line-height:22px; text-align:center; border-radius:50%; background:rgba(255,255,255,0.08); font-size:0.72rem; margin-right:10px; }

  .reflection-box{
    margin-top:18px; padding:16px 18px; border-radius:var(--radius-sm);
    background:var(--ember-soft); border:1px solid rgba(255,138,91,0.25);
    animation:fadeIn 0.4s var(--ease);
  }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }
  .reflection-box p{ margin:0; font-size:0.92rem; line-height:1.6; color:var(--text-hi); }
  .reflection-label{ font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--ember); margin-bottom:6px; display:block;}

  /* drag list (chapter 2 + 3) */
  .drag-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
  .drag-item{
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    border-radius:var(--radius-sm); border:1px solid var(--line);
    background:rgba(255,255,255,0.03); cursor:grab; user-select:none;
    transition:background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.15s var(--ease), box-shadow .2s var(--ease);
  }
  .drag-item:active{ cursor:grabbing; }
  .drag-item.dragging{ opacity:0.35; }
  .drag-item.picked{ border-color:var(--teal); box-shadow:0 0 0 2px rgba(94,234,212,0.3); background:var(--teal-soft); }
  .drag-item .rank-num{ font-family:"JetBrains Mono",monospace; font-size:0.85rem; color:var(--text-low); width:22px; }
  .drag-item .grip{ color:var(--text-low); font-size:1rem; letter-spacing:2px; }
  .drag-item .label{ flex:1; font-size:0.98rem; }
  .drag-item .drop-indicator{ height:2px; background:var(--teal); border-radius:2px; margin:-6px 0; opacity:0; }
  .drag-item.drop-above{ box-shadow: 0 -3px 0 0 var(--teal) inset; }
  .drag-item.drop-below{ box-shadow: 0 3px 0 0 var(--teal) inset; }
  .drag-help{ font-size:0.78rem; color:var(--text-low); margin-top:14px; }

  /* final reflection */
  .stat-row{ display:flex; flex-direction:column; gap:14px; margin:20px 0 8px; }
  .stat-line{ display:flex; align-items:center; gap:14px; }
  .stat-name{ width:180px; font-size:0.9rem; color:var(--text-mid); flex-shrink:0; }
  .stat-bar-track{ flex:1; height:10px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; }
  .stat-bar-fill{ height:100%; border-radius:999px; transition:width 1.1s var(--ease); }
  .stat-pct{ width:48px; text-align:right; font-family:"JetBrains Mono",monospace; font-size:0.85rem; color:var(--text-hi); }

  .insight-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px; }
  @media (max-width:640px){ .insight-grid{ grid-template-columns:1fr; } }
  .insight-card{ padding:18px; border-radius:var(--radius-sm); border:1px solid var(--line); background:rgba(255,255,255,0.02); }
  .insight-card h3{ margin:0 0 10px; font-size:0.95rem; display:flex; align-items:center; gap:8px; }
  .insight-card ul{ margin:0; padding-left:18px; color:var(--text-mid); font-size:0.88rem; line-height:1.6; }

  .badge-shelf{ display:flex; gap:10px; flex-wrap:wrap; margin:22px 0; }
  .achievement{
    display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px;
    background:rgba(167,139,250,0.12); border:1px solid rgba(167,139,250,0.3); color:var(--violet);
    font-size:0.8rem; animation:badgeIn 0.5s var(--ease);
  }
  @keyframes badgeIn{ from{ opacity:0; transform:scale(0.7);} to{ opacity:1; transform:scale(1);} }

  .closing{ text-align:center; margin-top:30px; padding-top:24px; border-top:1px solid var(--line); }
  .closing p{ color:var(--text-mid); font-size:1rem; line-height:1.7; max-width:520px; margin:0 auto; }

  /* toast notifications */
  #toast-region{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:60; display:flex; flex-direction:column; gap:8px; align-items:center; }
  .toast{
    padding:10px 18px; border-radius:999px; background:rgba(20,28,43,0.95); border:1px solid var(--line);
    color:var(--text-hi); font-size:0.85rem; box-shadow:var(--shadow); animation:toastIn 0.35s var(--ease), toastOut 0.4s var(--ease) 2.6s forwards;
  }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(12px);} to{ opacity:1; transform:translateY(0);} }
  @keyframes toastOut{ to{ opacity:0; transform:translateY(-8px);} }

  .completion-burst{ position:fixed; inset:0; pointer-events:none; z-index:70; display:flex; align-items:center; justify-content:center; }
  .burst-dot{ position:absolute; width:8px; height:8px; border-radius:50%; opacity:0.9; animation:burstFly 1.1s var(--ease) forwards; }
  @keyframes burstFly{ to{ transform:translate(var(--dx), var(--dy)) scale(0); opacity:0; } }

  footer.nav-footer{ display:flex; justify-content:space-between; margin-top:26px; gap:12px; }

  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  @media (max-width:640px){
    .card{ padding:20px; }
    .hero{ padding:36px 6px 20px; }
    .stat-name{ width:120px; font-size:0.8rem; }
  }
</style>
</head>
<body>

<div id="particles" aria-hidden="true"></div>

<div class="pulse-wrap" aria-hidden="true">
  <svg class="pulse-svg" viewBox="0 0 800 46" preserveAspectRatio="none">
    <defs>
      <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ff8a5b"/>
        <stop offset="50%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#5eead4"/>
      </linearGradient>
    </defs>
    <path class="pulse-line" d="M0,23 L120,23 L140,6 L160,40 L180,23 L260,23 L280,10 L300,36 L320,23 L420,23 L440,4 L460,42 L480,23 L560,23 L580,14 L600,32 L620,23 L800,23"></path>
  </svg>
</div>

<div id="app"></div>
<div id="toast-region" aria-live="polite"></div>
<div id="burst-region" class="completion-burst" aria-hidden="true"></div>

<script>
(function(){
  "use strict";

  /* ============ FIXED SESSION SETTINGS ============ */
  var MODE = "Stress Mode";
  var DIFFICULTY = "Beginner";
  var SCENARIO_COUNT = 9;
  var SCENARIO_TIME = 26; // seconds, generous for beginner even under stress framing

  var prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ============ AMBIENT PARTICLES ============ */
  (function initParticles(){
    var wrap = document.getElementById("particles");
    if(prefersReducedMotion) return;
    var colors = ["rgba(255,138,91,0.5)","rgba(94,234,212,0.5)","rgba(167,139,250,0.4)"];
    for(var i=0;i<16;i++){
      var p = document.createElement("div");
      p.className = "particle";
      var size = 4 + Math.random()*10;
      p.style.width = size+"px";
      p.style.height = size+"px";
      p.style.left = (Math.random()*100)+"%";
      p.style.top = (Math.random()*100)+"%";
      p.style.background = "radial-gradient(circle at 30% 30%,"+colors[i%colors.length]+", rgba(0,0,0,0) 70%)";
      p.style.animationDuration = (12 + Math.random()*14)+"s";
      p.style.animationDelay = (Math.random()*6)+"s";
      wrap.appendChild(p);
    }
  })();

  /* ============ SCENARIO DATA ============ */
  // Each option carries hidden weights across the five tendencies.
  var T = { analytical:"analytical", emotional:"emotional", overthink:"overthink", action:"action", balanced:"balanced" };

  function W(o){ return o; } // readability helper

  var ALL_SCENARIOS = [
    {
      id:"jobs", situation:"Two job offers landed this week and both companies want your answer by tomorrow morning. One pays more; the other feels like a better fit for growth.",
      hint:"There's no perfect answer here — notice what you reach for first.",
      options:[
        {text:"Make a pros-and-cons list and compare the numbers side by side.", scores:W({analytical:3, balanced:1}), reflection:"You reached for structure first. Laying facts side by side is often how you make sense of pressure."},
        {text:"Sit with how each offer makes you feel before deciding anything.", scores:W({emotional:3}), reflection:"You checked in with your gut. Your feelings are data too, and you trust them early."},
        {text:"Accept the higher-paying offer right away so it's settled.", scores:W({action:3}), reflection:"You moved fast to close the loop. Speed reduces the discomfort of an open decision for you."},
        {text:"Ask a mentor, sleep on it, and re-read both offers twice more.", scores:W({overthink:2, balanced:1}), reflection:"You gathered more input before committing. This can add confidence — watch that it doesn't become a loop."}
      ]
    },
    {
      id:"argument", situation:"You had a tense exchange with a close friend an hour ago. Your phone just buzzed with a message from them.",
      hint:"Notice your first impulse before you open the message.",
      options:[
        {text:"Reply immediately with exactly how you feel, unfiltered.", scores:W({emotional:3, action:1}), reflection:"You led with honesty in the moment. Your instinct is to keep the emotional channel open."},
        {text:"Reread the earlier messages a few times to find the 'right' words.", scores:W({overthink:3}), reflection:"You looked for the perfect phrasing before responding. Precision helps you feel safer, though it can also delay you."},
        {text:"Wait a bit, then reply once you've named what you actually want to say.", scores:W({balanced:3}), reflection:"You gave yourself a short pause with a purpose. That's a steady way to handle friction."},
        {text:"Break down what was actually said versus what you assumed was meant.", scores:W({analytical:3}), reflection:"You separated fact from interpretation. You often look for the logic underneath emotional moments."}
      ]
    },
    {
      id:"expense", situation:"An unexpected bill just hit your account, larger than planned, and rent is due in three days.",
      hint:"There's a decision to make quickly — how do you approach it?",
      options:[
        {text:"Open your budget and recalculate the numbers immediately.", scores:W({analytical:3}), reflection:"You went straight to the spreadsheet. Numbers ground you when things feel uncertain."},
        {text:"Feel a wave of stress first, then figure out what to do.", scores:W({emotional:2, overthink:1}), reflection:"You let the feeling register before problem-solving. That's a natural human response — nothing to fix."},
        {text:"Transfer money between accounts right away to cover it.", scores:W({action:3}), reflection:"You acted before overthinking the details. Quick containment is your default under pressure."},
        {text:"Replay how this happened several times, wondering what you missed.", scores:W({overthink:3}), reflection:"You spent time reviewing the 'why.' That reflection can be useful in small doses."}
      ]
    },
    {
      id:"group-project", situation:"A teammate hasn't delivered their part, and the group submission is due in a few hours.",
      hint:"Everyone reacts differently when a deadline is at risk.",
      options:[
        {text:"Message them calmly, then start drafting a backup plan just in case.", scores:W({balanced:3}), reflection:"You covered both the relationship and the risk. That dual awareness is a hallmark of balanced thinking."},
        {text:"List every possible reason they might be late before reacting.", scores:W({overthink:2, analytical:1}), reflection:"You explored explanations before acting. Understanding the 'why' matters to you, even under a clock."},
        {text:"Take over their part yourself so the deadline isn't at risk.", scores:W({action:3}), reflection:"You removed the uncertainty by acting directly. Control over the outcome matters more than waiting."},
        {text:"Feel frustrated first, then decide how to bring it up with them.", scores:W({emotional:3}), reflection:"You let the frustration surface honestly before choosing your next move."}
      ]
    },
    {
      id:"travel", situation:"Your flight was just cancelled and you have a connecting meeting you can't miss.",
      hint:"Time is tight — what's the first thing you reach for?",
      options:[
        {text:"Compare every rebooking option and their trade-offs before choosing.", scores:W({analytical:3}), reflection:"You weighed the options methodically, even with the clock running."},
        {text:"Book the very next available flight without overanalyzing it.", scores:W({action:3}), reflection:"You prioritized momentum over perfect information — a strength when speed truly matters."},
        {text:"Feel the disruption fully first — this throws off your whole day.", scores:W({emotional:2, overthink:1}), reflection:"You acknowledged how disruptive this felt before problem-solving. That's a very human first step."},
        {text:"Call someone for a second opinion while still weighing your own options.", scores:W({balanced:2, emotional:1}), reflection:"You brought in another perspective while staying engaged yourself — a collaborative, grounded move."}
      ]
    },
    {
      id:"criticism", situation:"Your manager just pointed out a mistake in your work in front of the team.",
      hint:"Public feedback lands differently for everyone.",
      options:[
        {text:"Mentally replay the moment on a loop for the rest of the day.", scores:W({overthink:3}), reflection:"The moment stayed with you longer than most. You tend to process criticism by revisiting it."},
        {text:"Ask a clarifying question on the spot to understand exactly what went wrong.", scores:W({analytical:3}), reflection:"You went straight for specifics. Clarity helps you convert criticism into something usable."},
        {text:"Feel embarrassed first, then decide how to respond once it settles.", scores:W({emotional:3}), reflection:"You gave the emotional reaction room before responding — a grounded, self-aware sequence."},
        {text:"Fix the mistake immediately so it's visibly resolved.", scores:W({action:3}), reflection:"You moved straight to correction. Demonstrating quick fixes is how you regain footing."}
      ]
    },
    {
      id:"deadlines", situation:"Three deadlines are landing on the same day, and you only just noticed.",
      hint:"There's more to do than time allows — what's your first move?",
      options:[
        {text:"Rank the three by urgency and impact before touching any of them.", scores:W({analytical:2, balanced:2}), reflection:"You built a plan before diving in. Structure under pressure is a strength for you."},
        {text:"Start on whichever one feels most overwhelming, to get it over with.", scores:W({emotional:2, action:1}), reflection:"You went toward the discomfort directly rather than avoiding it."},
        {text:"Start working on all three at once, switching between them.", scores:W({action:2, overthink:1}), reflection:"You kept momentum across everything at once, though this can spread focus thin."},
        {text:"Pause to consider every possible order before starting anything.", scores:W({overthink:3}), reflection:"You wanted certainty about the 'right' order first. That pause can help — or stall you."}
      ]
    },
    {
      id:"family-call", situation:"A family member calls with urgent news right as you're deep in an important task.",
      hint:"Competing priorities, no warning.",
      options:[
        {text:"Answer immediately — the task can wait.", scores:W({emotional:3, action:1}), reflection:"You let relationships take precedence instantly, without needing to weigh it."},
        {text:"Quickly assess how urgent the task truly is before deciding.", scores:W({analytical:3}), reflection:"You paused to evaluate both sides logically, even in an emotionally charged moment."},
        {text:"Answer, but stay distracted thinking about the unfinished task the whole time.", scores:W({overthink:3}), reflection:"Your attention split between both concerns at once — a common overthinking pattern under pressure."},
        {text:"Answer, fully present, then return to the task once the call ends.", scores:W({balanced:3}), reflection:"You handled one thing at a time with full attention. That's a balanced, grounded response."}
      ]
    },
    {
      id:"speech", situation:"You just learned your presentation slot moved up by two hours, with far less prep time than planned.",
      hint:"Pressure just increased suddenly — how do you meet it?",
      options:[
        {text:"Cut the material down to only the essentials, right now.", scores:W({action:2, analytical:1}), reflection:"You triaged fast, focusing on what mattered most under the new timeline."},

  /* ============ GENERIC ACCESSIBLE DRAG LIST ============ */
  // Handles both mouse/touch drag and keyboard reordering ("pick up" then arrows then "drop").
  function makeDraggable(listEl, onReorder){
    var pickedItem = null;

    function getItems(){ return Array.prototype.slice.call(listEl.querySelectorAll(".drag-item")); }

    function renumber(){
      getItems().forEach(function(item, idx){
        var rankEl = item.querySelector(".rank-num");
        if(rankEl) rankEl.textContent = (idx+1)+".";
        item.setAttribute("aria-posinset", idx+1);
      });
    }

    getItems().forEach(function(item){ attachHandlers(item); });
    renumber();

    function attachHandlers(item){
      item.setAttribute("draggable","true");
      item.setAttribute("tabindex","0");
      item.setAttribute("role","option");
      item.setAttribute("aria-setsize", getItems().length);

      item.addEventListener("dragstart", function(e){
        item.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", item.dataset.id);
      });
      item.addEventListener("dragend", function(){
        item.classList.remove("dragging");
        clearDropStyles();
        onReorder(getItems().map(function(i){return i.dataset.id;}));
        renumber();
      });
      item.addEventListener("dragover", function(e){
        e.preventDefault();
        var dragging = listEl.querySelector(".dragging");
        if(!dragging || dragging === item) return;
        clearDropStyles();
        var rect = item.getBoundingClientRect();
        var isAbove = (e.clientY - rect.top) < rect.height/2;
        if(isAbove){
          item.classList.add("drop-above");
          listEl.insertBefore(dragging, item);
        } else {
          item.classList.add("drop-below");
          listEl.insertBefore(dragging, item.nextSibling);
        }
      });

      item.addEventListener("keydown", function(e){
        var items = getItems();
        var idx = items.indexOf(item);
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          if(pickedItem === item){
            pickedItem.classList.remove("picked");
            pickedItem = null;
            toast("Placed.");
            onReorder(getItems().map(function(i){return i.dataset.id;}));
          } else {
            if(pickedItem) pickedItem.classList.remove("picked");
            pickedItem = item;
            item.classList.add("picked");
            toast("Picked up. Use arrow keys to move, Enter to place.");
          }
        } else if((e.key === "ArrowUp" || e.key === "ArrowDown") && pickedItem === item){
          e.preventDefault();
          var swapWith = e.key === "ArrowUp" ? items[idx-1] : items[idx+1];
          if(swapWith){
            if(e.key === "ArrowUp") listEl.insertBefore(item, swapWith);
            else listEl.insertBefore(item, swapWith.nextSibling);
            renumber();
            item.focus();
          }
        } else if(e.key === "ArrowUp" && pickedItem !== item){
          e.preventDefault();
          if(items[idx-1]) items[idx-1].focus();
        } else if(e.key === "ArrowDown" && pickedItem !== item){
          e.preventDefault();
          if(items[idx+1]) items[idx+1].focus();
        }
      });

      // touch support
      var touchStartY = null;
      item.addEventListener("touchstart", function(e){
        touchStartY = e.touches[0].clientY;
        item.classList.add("dragging");
      }, {passive:true});
      item.addEventListener("touchmove", function(e){
        if(touchStartY === null) return;
        var touchY = e.touches[0].clientY;
        var el = document.elementFromPoint(e.touches[0].clientX, touchY);
        var overItem = el ? el.closest(".drag-item") : null;
        if(overItem && overItem !== item){
          clearDropStyles();
          var rect = overItem.getBoundingClientRect();
          var isAbove = (touchY - rect.top) < rect.height/2;
          if(isAbove){ listEl.insertBefore(item, overItem); }
          else { listEl.insertBefore(item, overItem.nextSibling); }
          renumber();
        }
      }, {passive:true});
      item.addEventListener("touchend", function(){
        touchStartY = null;
        item.classList.remove("dragging");
        clearDropStyles();
        onReorder(getItems().map(function(i){return i.dataset.id;}));
        renumber();
      });
    }

    function clearDropStyles(){
      getItems().forEach(function(i){ i.classList.remove("drop-above","drop-below"); });
    }
  }

  function scoreTimeline(){
    var order = state.timelineOrder;
    var n = order.length;
    function pos(id){ return order.indexOf(id); }

    var actScore = (n - pos("act")) * 0.6;
    var analyzeScore = (n - pos("analyze")) * 0.6;
    var adviceScore = (n - pos("advice")) * 0.5;

    var stepsBeforeAct = pos("act"); // more steps before acting => more deliberation/overthinking potential
    var overthinkScore = stepsBeforeAct >= 4 ? (stepsBeforeAct - 3) * 1.4 : 0;

    // Kendall-tau-ish: count adjacent inversions vs ideal order to estimate closeness to a steady sequence
    var idealPos = {};
    IDEAL_ORDER.forEach(function(id, i){ idealPos[id]=i; });
    var inversions = 0;
    for(var i=0;i<order.length;i++){
      for(var j=i+1;j<order.length;j++){
        if(idealPos[order[i]] > idealPos[order[j]]) inversions++;
      }
    }
    var maxInversions = (n*(n-1))/2;
    var closeness = 1 - (inversions/maxInversions); // 0..1
    var balancedScore = closeness * 6;

    addScore({
      action: actScore,
      analytical: analyzeScore,
      emotional: adviceScore,
      overthink: overthinkScore,
      balanced: balancedScore
    });
  }

    emotional: {name:"Emotional Intuitive", color:"#ffb088", desc:"You tend to check in with how something feels before anything else."},
    overthink: {name:"Overthinking Loop Style", color:"#a78bfa", desc:"You tend to revisit and re-examine a decision more than once before settling."},
    action: {name:"Action-First Decision Maker", color:"#ff8a5b", desc:"You tend to move quickly and adjust course as you go."},
    balanced: {name:"Balanced Reflective Thinker", color:"#5eead4", desc:"You tend to pace yourself between reflection and action."}
  };

  function computePercentages(){
    var s = state.scores;
    var keys = Object.keys(TENDENCY_META);
    var floor = 0.4; // avoid true zeros dominating oddly
    var raw = {};
    var sum = 0;
    keys.forEach(function(k){ raw[k] = Math.max(s[k]||0, 0) + floor; sum += raw[k]; });
    var pct = {};
    var running = 0;
    keys.forEach(function(k, i){
      if(i < keys.length-1){
        var p = Math.round((raw[k]/sum)*100);
        pct[k] = p;
        running += p;
      } else {
        pct[k] = 100 - running;
      }
    });
    return pct;
  }

            '<div class="chapter-eyebrow mono">Final Reflection Journal</div>'+
            '<h2 class="display">Your Thinking Pattern, Today</h2>'+
            '<p>This is a snapshot, not a label. Patterns shift with context, mood, and practice.</p>'+
          '</div>'+
          '<div class="badge-shelf" id="badgeShelf">'+
            state.badges.map(function(b){ return '<span class="achievement">🏅 '+b+'</span>'; }).join("")+
          '</div>'+
          '<div class="stat-row" id="statRow">'+statRows+'</div>'+
          '<div class="insight-grid">'+
            '<div class="insight-card"><h3>💪 Strengths</h3><ul>'+strengths.map(function(s){return '<li>'+s+'</li>';}).join("")+'</ul></div>'+
            '<div class="insight-card"><h3>🌱 Possible Blind Spots</h3><ul>'+blindSpots.map(function(s){return '<li>'+s+'</li>';}).join("")+'</ul></div>'+
            '<div class="insight-card"><h3>💭 Reflection Prompts</h3><ul>'+prompts.map(function(s){return '<li>'+s+'</li>';}).join("")+'</ul></div>'+
            '<div class="insight-card"><h3>📈 Growth Suggestions</h3><ul>'+growth.map(function(s){return '<li>'+s+'</li>';}).join("")+'</ul></div>'+
          '</div>'+
          '<div class="closing">'+
            '<p>You appear to lead with <strong>'+TENDENCY_META[top].name.toLowerCase()+'</strong> tendencies most often, with <strong>'+TENDENCY_META[second].name.toLowerCase()+'</strong> close behind. Neither is right or wrong — understanding your own rhythm is what helps you choose it on purpose, especially when the pressure is on.</p>'+
          '</div>'+
          '<footer class="nav-footer">'+
            '<button class="btn ghost" id="restartBtn">Restart Journey</button>'+
            '<button class="btn warm" id="replayBtn">Replay With New Scenarios</button>'+
          '</footer>'+
        '</div>'+
      '</div>';

    requestAnimationFrame(function(){
      document.querySelectorAll(".stat-bar-fill").forEach(function(el){
        el.style.width = el.dataset.target+"%";
      });
    });

    fireCompletionBurst();

    document.getElementById("restartBtn").addEventListener("click", resetAll);
    document.getElementById("replayBtn").addEventListener("click", function(){
      state.scores = {analytical:0, emotional:0, overthink:0, action:0, balanced:0};
      state.answers = [];
      state.scenarios = pickScenarios();
      state.scenarioIndex = 0;
      state.priorityOrder = VALUES.map(function(v){return v.id;});
      state.timelineOrder = TIMELINE_STEPS.map(function(s){return s.id;});
      transitionTo("chapter1", renderChapter1);
    });
  }

  function fireCompletionBurst(){
    if(prefersReducedMotion) return;
    var region = document.getElementById("burst-region");
    var colors = ["#ff8a5b","#5eead4","#a78bfa"];
    for(var i=0;i<24;i++){
      var dot = document.createElement("div");
      dot.className = "burst-dot";
      var angle = (Math.PI*2)*(i/24);
      var dist = 120 + Math.random()*140;
      dot.style.setProperty("--dx", (Math.cos(angle)*dist)+"px");
      dot.style.setProperty("--dy", (Math.sin(angle)*dist)+"px");
      dot.style.background = colors[i%colors.length];
      dot.style.left = "50%";
      dot.style.top = "30%";
      region.appendChild(dot);
      (function(d){ setTimeout(function(){ if(d.parentNode) d.parentNode.removeChild(d); }, 1200); })(dot);
    }
  }

  function resetAll(){
    state.screen = "start";
    state.scenarios = [];
    state.scenarioIndex = 0;
    state.scores = {analytical:0, emotional:0, overthink:0, action:0, balanced:0};
    state.answers = [];
    state.priorityOrder = VALUES.map(function(v){return v.id;});
    state.timelineOrder = TIMELINE_STEPS.map(function(s){return s.id;});
    state.badges = [];
    transitionTo("start", renderStart);
  }

  /* ============ INIT ============ */
  renderStart();

})();
</script>
</body>
</html>
