<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center · Personal Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --void:#0a0e17;
  --surface:#111827;
  --surface-2:#161f30;
  --elevated:#1b2538;
  --border:rgba(232,236,243,0.08);
  --border-strong:rgba(232,236,243,0.16);
  --text:#e8ecf3;
  --text-muted:#8b95a7;
  --text-faint:#5b6478;
  --teal:#2dd4bf;
  --teal-dim:rgba(45,212,191,0.14);
  --purple:#8b7cf6;
  --purple-dim:rgba(139,124,246,0.14);
  --amber:#f5a623;
  --amber-dim:rgba(245,166,35,0.14);
  --rose:#fb7185;
  --rose-dim:rgba(251,113,133,0.14);
  --sky:#38bdf8;
  --sky-dim:rgba(56,189,248,0.14);
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:22px;
  --shadow-soft:0 1px 2px rgba(0,0,0,0.4);
  --shadow-lift:0 20px 40px -12px rgba(0,0,0,0.55);
  --sidebar-w:236px;
}
[data-theme="light"]{
  --void:#eef1f8;
  --surface:#ffffff;
  --surface-2:#f6f8fc;
  --elevated:#ffffff;
  --border:rgba(16,24,40,0.08);
  --border-strong:rgba(16,24,40,0.14);
  --text:#101828;
  --text-muted:#5b6478;
  --text-faint:#8b95a7;
  --shadow-soft:0 1px 2px rgba(16,24,40,0.06);
  --shadow-lift:0 20px 40px -12px rgba(16,24,40,0.16);
}

*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0) 0 0/22px 22px,
    var(--void);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  transition:background-color .25s ease,color .25s ease;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
}
h1,h2,h3,h4{font-family:var(--font-display); margin:0; letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit;}
::selection{background:var(--teal); color:#04211d;}
a{color:var(--teal);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:8px;}
:focus-visible{outline:2px solid var(--teal); outline-offset:2px; border-radius:4px;}

.mono{font-family:var(--font-mono);}
.num{font-variant-numeric:tabular-nums;}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:flex; min-height:100vh;}

/* ---- Sidebar ---- */
.sidebar{
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:22px 14px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
  z-index:40;
}
.brand{display:flex; align-items:center; gap:10px; padding:6px 10px 22px;}
.brand-mark{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:conic-gradient(from 180deg, var(--teal), var(--purple), var(--sky), var(--teal));
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-soft);
}
.brand-mark svg{width:18px;height:18px;}
.brand-text{font-family:var(--font-display); font-weight:700; font-size:15.5px; line-height:1.15;}
.brand-text span{display:block; font-family:var(--font-mono); font-weight:400; font-size:10.5px; color:var(--text-muted); letter-spacing:.06em; text-transform:uppercase; margin-top:2px;}

.nav-group-label{
  font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--text-faint); padding:14px 12px 6px;
}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:var(--radius-sm);
  color:var(--text-muted); cursor:pointer; font-size:13.5px; font-weight:500; margin-bottom:2px;
  border:1px solid transparent; transition:background .15s ease, color .15s ease;
  position:relative;
}
.nav-item svg{width:17px;height:17px; flex-shrink:0; opacity:.85;}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.active{background:var(--teal-dim); color:var(--teal); border-color:rgba(45,212,191,0.25);}
.nav-item.active svg{opacity:1;}
.nav-kbd{margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--text-faint); border:1px solid var(--border-strong); border-radius:4px; padding:1px 5px;}

.sidebar-foot{margin-top:auto; padding-top:14px; border-top:1px solid var(--border);}
.profile-chip{display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:var(--radius-sm); background:var(--surface-2);}
.profile-chip .avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--sky)); flex-shrink:0;}
.profile-chip .pname{font-size:12.5px; font-weight:600;}
.profile-chip .prole{font-size:10.5px; color:var(--text-muted);}

/* ---- Main ---- */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:16px 28px; background:color-mix(in srgb, var(--void) 75%, transparent);
  backdrop-filter:blur(14px); border-bottom:1px solid var(--border);
}
.menu-btn{display:none; background:none; border:1px solid var(--border-strong); border-radius:8px; width:36px; height:36px; color:var(--text); cursor:pointer;}
.topbar-title{font-family:var(--font-display); font-size:18px; font-weight:600;}
.topbar-sub{font-size:12px; color:var(--text-muted); margin-top:1px;}
.topbar-actions{display:flex; align-items:center; gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border-strong);
  background:var(--surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s ease;
}
.icon-btn:hover{color:var(--text); border-color:var(--teal); background:var(--teal-dim);}
.icon-btn svg{width:17px;height:17px;}
.btn{
  font-family:var(--font-body); font-weight:600; font-size:13px; padding:9px 16px; border-radius:10px;
  border:1px solid var(--border-strong); background:var(--surface); color:var(--text); cursor:pointer;
  display:inline-flex; align-items:center; gap:7px; transition:all .15s ease;
}
.btn:hover{border-color:var(--teal);}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--sky)); color:#04211d; border:none;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{border-color:transparent; background:transparent;}
.btn.danger:hover{border-color:var(--rose); color:var(--rose);}
.btn svg{width:14px;height:14px;}
.btn.small{padding:6px 11px; font-size:12px;}

.content{padding:24px 28px 60px; max-width:1400px; width:100%; margin:0 auto;}
.tab-panel{display:none; animation:fadeUp .35s ease;}
.tab-panel.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

.section-head{margin-bottom:18px;}
.section-head h2{font-size:21px;}
.section-head p{color:var(--text-muted); font-size:13px; margin-top:4px; max-width:640px;}

/* ---- Grid & cards ---- */
.grid{display:grid; gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-12{grid-template-columns:repeat(12,1fr);}
.span-4{grid-column:span 4;} .span-6{grid-column:span 6;} .span-7{grid-column:span 7;} .span-5{grid-column:span 5;} .span-8{grid-column:span 8;} .span-12{grid-column:span 12;}

.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:20px; box-shadow:var(--shadow-soft);
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.card.hoverable:hover{transform:translateY(-2px); box-shadow:var(--shadow-lift); border-color:var(--border-strong);}
.card-glass{
  background:color-mix(in srgb, var(--surface) 70%, transparent);
  backdrop-filter:blur(18px);
  border:1px solid var(--border-strong);
}
.card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.card-head h3{font-size:14.5px; font-weight:600;}
.card-head .eyebrow{font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); margin-bottom:3px;}
.card-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.card-icon svg{width:17px;height:17px;}

.stat-value{font-family:var(--font-display); font-size:30px; font-weight:700; letter-spacing:-0.02em;}
.stat-label{font-size:12.5px; color:var(--text-muted); margin-top:2px;}
.stat-delta{display:inline-flex; align-items:center; gap:3px; font-size:11.5px; font-weight:600; padding:2px 8px; border-radius:20px; margin-top:8px;}
.stat-delta.up{color:var(--teal); background:var(--teal-dim);}
.stat-delta.down{color:var(--rose); background:var(--rose-dim);}
.stat-delta svg{width:11px;height:11px;}

.divider{height:1px; background:var(--border); margin:16px 0; border:none;}
.pill{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px;}
.pill.teal{color:var(--teal); background:var(--teal-dim);}
.pill.purple{color:var(--purple); background:var(--purple-dim);}
.pill.amber{color:var(--amber); background:var(--amber-dim);}
.pill.rose{color:var(--rose); background:var(--rose-dim);}
.pill.sky{color:var(--sky); background:var(--sky-dim);}

/* ---- Hero: Financial Health ring ---- */
.hero{
  display:grid; grid-template-columns:auto 1fr; gap:32px; align-items:center;
  background:
    radial-gradient(circle at 85% 20%, var(--teal-dim), transparent 55%),
    radial-gradient(circle at 15% 80%, var(--purple-dim), transparent 55%),
    var(--surface);
  border:1px solid var(--border-strong); border-radius:var(--radius-lg); padding:28px 30px;
  position:relative; overflow:hidden;
}
.hero::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(circle at 1px 1px, var(--border-strong) 1px, transparent 0) 0 0/20px 20px;
  mask-image:linear-gradient(to bottom, black, transparent 80%);
}
.health-ring-wrap{position:relative; width:168px; height:168px; flex-shrink:0;}
.health-ring-wrap svg{width:100%; height:100%; transform:rotate(-90deg);}
.health-ring-bg{fill:none; stroke:var(--border); stroke-width:11;}
.health-ring-fg{fill:none; stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1);}
.health-ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.health-score-num{font-family:var(--font-display); font-size:40px; font-weight:700;}
.health-score-lbl{font-family:var(--font-mono); font-size:10px; color:var(--text-muted); letter-spacing:.08em; text-transform:uppercase;}
.hero-right h1{font-size:22px; margin-bottom:6px;}
.hero-right p{color:var(--text-muted); font-size:13.5px; max-width:520px; line-height:1.5;}
.hero-metrics{display:flex; gap:26px; margin-top:18px; flex-wrap:wrap;}
.hero-metric .v{font-family:var(--font-display); font-weight:700; font-size:19px;}
.hero-metric .l{font-size:11.5px; color:var(--text-muted);}

/* ---- Progress bars / rings ---- */
.bar-track{height:8px; border-radius:20px; background:var(--surface-2); overflow:hidden; position:relative;}
.bar-fill{height:100%; border-radius:20px; transition:width .8s cubic-bezier(.16,1,.3,1);}
.bar-row{margin-bottom:14px;}
.bar-row:last-child{margin-bottom:0;}
.bar-row-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;}
.bar-row-top .name{color:var(--text); font-weight:500;}
.bar-row-top .amt{color:var(--text-muted); font-family:var(--font-mono); font-size:11.5px;}

/* ---- Table ---- */
table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:left; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-faint); font-weight:500; padding:8px 10px; border-bottom:1px solid var(--border);}
td{padding:11px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .15s ease;}
tbody tr:hover{background:var(--surface-2);}
.row-icon{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center; margin-right:9px; vertical-align:middle;}

/* ---- Forms ---- */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:var(--text-muted);}
.field input, .field select, .field textarea{
  width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--border-strong);
  background:var(--surface-2); color:var(--text); font-family:var(--font-body); font-size:13.5px;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--teal);}
.field-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px;}
.inline-form{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}

/* ---- Empty state ---- */
.empty-state{text-align:center; padding:36px 20px; color:var(--text-muted);}
.empty-state svg{width:38px;height:38px; margin-bottom:10px; opacity:.5;}
.empty-state p{font-size:13px;}

/* ---- Modal ---- */
.modal-backdrop{position:fixed; inset:0; background:rgba(4,8,16,0.6); backdrop-filter:blur(3px); z-index:100; display:none; align-items:center; justify-content:center; padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--elevated); border:1px solid var(--border-strong); border-radius:var(--radius-md); padding:24px; width:100%; max-width:440px; max-height:86vh; overflow-y:auto; box-shadow:var(--shadow-lift); animation:modalIn .25s cubic-bezier(.16,1,.3,1);}
@keyframes modalIn{from{opacity:0; transform:translateY(10px) scale(.98);} to{opacity:1; transform:none;}}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
.modal-head h3{font-size:16px;}

/* ---- Toast ---- */
#toast-wrap{position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--elevated); border:1px solid var(--border-strong); border-left:3px solid var(--teal); padding:12px 16px; border-radius:10px; font-size:13px; box-shadow:var(--shadow-lift); animation:toastIn .3s ease; max-width:300px;}
@keyframes toastIn{from{opacity:0; transform:translateX(14px);} to{opacity:1; transform:none;}}

/* ---- Loading ---- */
.skeleton{background:linear-gradient(90deg, var(--surface-2) 25%, var(--elevated) 37%, var(--surface-2) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:8px;}
@keyframes shimmer{0%{background-position:100% 0;} 100%{background-position:0 0;}}
.loader-ring{width:22px;height:22px;border:3px solid var(--border-strong); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---- Charts (pure CSS/SVG) ---- */
.donut-wrap{position:relative; width:180px; height:180px; margin:0 auto;}
.donut-wrap svg{width:100%; height:100%; transform:rotate(-90deg);}
.donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.legend{display:flex; flex-direction:column; gap:9px; margin-top:14px;}
.legend-row{display:flex; align-items:center; gap:9px; font-size:12.5px;}
.legend-dot{width:9px;height:9px;border-radius:3px; flex-shrink:0;}
.legend-row .amt{margin-left:auto; font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted);}

.bars-chart{display:flex; align-items:flex-end; gap:10px; height:150px; padding-top:10px;}
.bars-chart .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:8px;}
.bars-chart .bar-col .stick{width:100%; max-width:26px; border-radius:6px 6px 3px 3px; transition:height .8s cubic-bezier(.16,1,.3,1);}
.bars-chart .bar-col .lbl{font-size:10.5px; color:var(--text-faint); font-family:var(--font-mono);}

.gauge-wrap{position:relative; width:150px; height:88px; margin:0 auto;}
.gauge-wrap svg{width:100%;height:100%;}
.gauge-val{position:absolute; bottom:0; width:100%; text-align:center; font-family:var(--font-display); font-weight:700; font-size:22px;}

/* ---- Toggle switch ---- */
.switch{position:relative; width:42px; height:24px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.switch .track{position:absolute; inset:0; background:var(--surface-2); border:1px solid var(--border-strong); border-radius:20px; cursor:pointer; transition:background .2s;}
.switch .track::before{content:''; position:absolute; width:16px; height:16px; left:3px; top:2.5px; background:var(--text-muted); border-radius:50%; transition:transform .2s, background .2s;}
.switch input:checked + .track{background:var(--teal-dim); border-color:var(--teal);}
.switch input:checked + .track::before{transform:translateX(18px); background:var(--teal);}

/* ---- Module tag chips ---- */
.chip{display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:20px; border:1px solid var(--border-strong); font-size:12.5px; cursor:pointer; background:var(--surface-2); transition:all .15s;}
.chip:hover{border-color:var(--teal); color:var(--teal);}
.chip.active{background:var(--teal-dim); border-color:var(--teal); color:var(--teal);}

/* ---- What-if slider ---- */
.slider-row{margin-bottom:20px;}
input[type=range]{-webkit-appearance:none; width:100%; height:5px; border-radius:6px; background:var(--surface-2); outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:17px;height:17px;border-radius:50%; background:var(--teal); cursor:pointer; box-shadow:0 0 0 4px var(--teal-dim);}
input[type=range]::-moz-range-thumb{width:17px;height:17px;border-radius:50%; background:var(--teal); border:none; cursor:pointer; box-shadow:0 0 0 4px var(--teal-dim);}

/* ---- Timeline ---- */
.timeline{position:relative; padding-left:22px;}
.timeline::before{content:''; position:absolute; left:5px; top:4px; bottom:4px; width:2px; background:var(--border-strong);}
.tl-item{position:relative; padding-bottom:20px;}
.tl-item::before{content:''; position:absolute; left:-22px; top:2px; width:11px; height:11px; border-radius:50%; background:var(--teal); box-shadow:0 0 0 4px var(--teal-dim);}
.tl-item:last-child{padding-bottom:0;}
.tl-date{font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); text-transform:uppercase;}
.tl-title{font-weight:600; font-size:13.5px; margin-top:2px;}

/* ---- Insight card ---- */
.insight-card{display:flex; gap:12px; padding:14px; border-radius:12px; background:var(--surface-2); border:1px solid var(--border); margin-bottom:10px;}
.insight-card:last-child{margin-bottom:0;}
.insight-icon{width:32px;height:32px;border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
.insight-title{font-size:13px; font-weight:600; margin-bottom:3px;}
.insight-body{font-size:12.5px; color:var(--text-muted); line-height:1.5;}

/* ---- Resource list ---- */
.res-list{display:flex; flex-direction:column; gap:2px;}
.res-item{display:flex; align-items:center; gap:12px; padding:11px 8px; border-radius:9px; text-decoration:none; color:inherit;}
.res-item:hover{background:var(--surface-2);}
.res-item .ttl{font-size:13px; font-weight:600;}
.res-item .sub{font-size:11.5px; color:var(--text-muted);}

/* ---- prompt card ---- */
.prompt-card{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; position:relative;}
.prompt-text{font-family:var(--font-mono); font-size:12px; line-height:1.6; color:var(--text); padding-right:36px;}
.copy-btn{position:absolute; top:12px; right:12px; width:26px;height:26px; border-radius:7px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer;}
.copy-btn:hover{color:var(--teal); border-color:var(--teal);}

@media print{
  .sidebar,.topbar,.no-print{display:none !important;}
  body{background:#fff !important; color:#000 !important;}
  .card{border:1px solid #ccc !important; box-shadow:none !important; break-inside:avoid;}
  .tab-panel{display:block !important;}
}

@media (max-width: 1080px){
  .grid-4{grid-template-columns:repeat(2,1fr);}

function uid(){ return Math.random().toString(36).slice(2,10); }
function isoDaysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function isoDaysFromNow(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function addMonths(n){ const d=new Date(); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); }

let STATE = loadState();
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){ console.error('Load failed, using defaults', e); return defaultState(); }
}
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }
  catch(e){ toast('Could not save — storage may be full.', 'error'); }
}

function fmt(n){
  n = Number(n)||0;
  return CUR + n.toLocaleString('en-IN', {maximumFractionDigits:0});
}
function fmt2(n){
  n = Number(n)||0;
  return CUR + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function pct(n){ return Math.round(n*10)/10; }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg, kind='ok'){
  const wrap = document.getElementById('toast-wrap');

/* ---- animated counter ---- */
function animateCounter(el, to, prefix='', decimals=0, duration=900){
  const from = 0;
  const start = performance.now();
  function step(t){
    const p = clamp((t-start)/duration,0,1);
    const eased = 1-Math.pow(1-p,3);
    const val = from + (to-from)*eased;
    el.textContent = prefix + val.toLocaleString('en-IN',{maximumFractionDigits:decimals, minimumFractionDigits:decimals});
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ---- SVG chart helpers ---- */
function svgDonut(segments, size=180, thickness=22){
  // segments: [{value, color}]
  const total = segments.reduce((a,s)=>a+s.value,0) || 1;
  const r = (size/2) - thickness/2;
  const c = 2*Math.PI*r;
  let offset = 0;
  const cx = size/2, cy = size/2;
  let circles = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="${thickness}"/>`;
  segments.forEach(s=>{
    const frac = s.value/total;
    const len = frac*c;
    circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thickness}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-offset}" stroke-linecap="butt" style="transition:stroke-dasharray .8s cubic-bezier(.16,1,.3,1)"/>`;
    offset += len;
  });
  return `<svg viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">${circles}</svg>`;
}
function svgGauge(value, max, color='var(--teal)'){
  // semi-circle gauge, value 0..max
  const w=150,h=88, r=64, cx=75, cy=80;
  const frac = clamp(value/max,0,1);
  const c = Math.PI*r;
  const len = frac*c;
  return `<svg viewBox="0 0 ${w} ${h+8}">
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="var(--surface-2)" stroke-width="13" stroke-linecap="round"/>
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round"
      stroke-dasharray="${len} ${c-len}" style="transition:stroke-dasharray 1s cubic-bezier(.16,1,.3,1)"/>
  </svg>`;
}
function ringDashOffset(pctValue, r){
  const c = 2*Math.PI*r;
  return c - (clamp(pctValue,0,100)/100)*c;
}
function sparkline(values, w=260, h=60, color='var(--teal)'){
  if(values.length<2) values=[0,...values];
  const max = Math.max(...values,1), min=Math.min(...values,0);
  const range = (max-min)||1;
  const step = w/(values.length-1);
  const pts = values.map((v,i)=>`${i*step},${h-((v-min)/range)*h}`).join(' ');
  const areaPts = `0,${h} ${pts} ${w},${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;">
    <polygon points="${areaPts}" fill="${color}" opacity="0.12"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

/* ================================================================
   DERIVED METRICS ENGINE
   ================================================================ */
function monthlyIncomeTotal(){
  return STATE.income.reduce((sum,i)=>{
    const mult = i.freq==='Monthly'?1 : i.freq==='Weekly'?4.33 : i.freq==='Yearly'?(1/12) : i.freq==='One-time'?0:1;
    return sum + (Number(i.amount)||0)*mult;
  },0);
}
function currentMonthExpenses(){
  const now = new Date(); const ym = now.toISOString().slice(0,7);
  return STATE.expenses.filter(e=>e.date.slice(0,7)===ym).reduce((s,e)=>s+Number(e.amount||0),0);
}
function totalExpensesAllTime(){ return STATE.expenses.reduce((s,e)=>s+Number(e.amount||0),0); }
function expensesByCategory(monthOnly=true){
  const now = new Date(); const ym = now.toISOString().slice(0,7);
  const src = monthOnly ? STATE.expenses.filter(e=>e.date.slice(0,7)===ym) : STATE.expenses;
  const map = {};
  src.forEach(e=>{ map[e.category] = (map[e.category]||0) + Number(e.amount||0); });
  return Object.entries(map).map(([category,value])=>({category, value})).sort((a,b)=>b.value-a.value);
}
function totalBudget(){ return Object.values(STATE.budgets).reduce((s,v)=>s+Number(v||0),0); }
function totalDebtBalance(){ return STATE.debts.reduce((s,d)=>s+Number(d.balance||0),0); }
function totalInvestmentValue(){ return STATE.investments.reduce((s,i)=>s+Number(i.amount||0),0); }
function totalAssets(){
  const savingsTotal = STATE.goals.reduce((s,g)=>s+Number(g.current||0),0) + Number(STATE.emergencyFund.current||0);
  return savingsTotal + totalInvestmentValue();
}
function netWorth(){ return totalAssets() - totalDebtBalance(); }
function savingsRate(){
  const inc = monthlyIncomeTotal();
  const exp = currentMonthExpenses();
  if(inc<=0) return exp>0 ? -100 : 0;
  return clamp(((inc-exp)/inc)*100, -999, 100);
}
function monthlyCashFlow(){ return monthlyIncomeTotal() - currentMonthExpenses(); }
function emergencyFundMonths(){
  const exp = currentMonthExpenses()||1;
  return STATE.emergencyFund.current / exp;
}
function budgetUtilization(){
  const tb = totalBudget()||1;
  return (currentMonthExpenses()/tb)*100;
}

function healthScore(){
  // Weighted, works even with zero/irregular income (common for students).
  let score = 0;
  // 1. Savings rate (30 pts) — irregular income handled gracefully
  const sr = savingsRate();
  score += clamp((sr+20)/120,0,1) * 30;
  // 2. Emergency fund coverage (20 pts) — target ~3 months expenses, scaled for small budgets
  const efMonths = emergencyFundMonths();
  score += clamp(efMonths/3,0,1) * 20;
  // 3. Budget discipline (20 pts) — staying at/under budget
  const bu = budgetUtilization();
  score += (bu<=100 ? 1 : clamp(1-((bu-100)/100),0,1)) * 20;
  // 4. Debt health (15 pts) — no debt = full marks
  const debtRatio = monthlyIncomeTotal()>0 ? totalDebtBalance()/(monthlyIncomeTotal()*12) : (totalDebtBalance()>0?1:0);
  score += clamp(1-debtRatio,0,1) * 15;
  // 5. Goal progress / investing started (15 pts)
  const goalProgress = STATE.goals.length ? STATE.goals.reduce((s,g)=>s+clamp(g.current/(g.target||1),0,1),0)/STATE.goals.length : 0;
  const investing = STATE.investments.length>0 ? 1 : 0.3;
  score += clamp((goalProgress*0.7 + investing*0.3),0,1) * 15;
  return Math.round(clamp(score,0,100));
}
function healthColor(score){
  if(score>=75) return 'var(--teal)';
  if(score>=50) return 'var(--sky)';
  if(score>=30) return 'var(--amber)';
  return 'var(--rose)';
}
function healthLabel(score){
  if(score>=75) return 'Excellent';
  if(score>=50) return 'Good';
  if(score>=30) return 'Needs Attention';
  return 'At Risk';
}

function buildReportText(kind){

  let multiplier = kind==='quarterly'?3 : kind==='annual'?12 : 1;
  let lines = [];
  lines.push(`${periodLabel.toUpperCase()} REPORT`);
  lines.push(`Generated ${new Date().toLocaleString('en-IN')}`);
  lines.push('');
  lines.push(`Financial Health Score: ${score}/100 (${healthLabel(score)})`);
  lines.push(`Net Worth: ${fmt(netWorth())}`);
  lines.push(`Estimated Income (period): ${fmt(inc*multiplier)}`);
  lines.push(`Estimated Expenses (period): ${fmt(exp*multiplier)}`);
  lines.push(`Cash Flow (period): ${fmt(cf*multiplier)}`);
  lines.push(`Savings Rate: ${pct(savingsRate())}%`);
  lines.push(`Emergency Fund: ${fmt(STATE.emergencyFund.current)} / ${fmt(STATE.emergencyFund.target)} (${emergencyFundMonths().toFixed(1)} months coverage)`);
  lines.push('');
  lines.push('TOP EXPENSE CATEGORIES (this month)');
  cats.forEach(c=> lines.push(`  - ${c.category}: ${fmt(c.value)}`));
  lines.push('');
  lines.push('GOALS');
  STATE.goals.forEach(g=> lines.push(`  - ${g.name}: ${fmt(g.current)} / ${fmt(g.target)} (target ${g.targetDate})`));
  if(STATE.debts.length){
    lines.push('');
    lines.push('DEBTS');
    STATE.debts.forEach(d=> lines.push(`  - ${d.name}: ${fmt(d.balance)} balance at ${d.rate}%`));
  }
  return lines.join('\n');
}

function recommendationEngine(){
  const recs = [];
  const sr = savingsRate();
  const efMonths = emergencyFundMonths();
  const bu = budgetUtilization();
  const cats = expensesByCategory(true);

  recs.push({priority: efMonths<3?'high':'low', icon:'shield', title:'Grow the emergency fund',
    body: efMonths<1 ? 'Start small — even ₹300–500 a month builds real security over a semester.' : `You're at ${efMonths.toFixed(1)} months of coverage. Keep going toward 3 months.`});

  if(cats[0] && STATE.budgets[cats[0].category] && cats[0].value > STATE.budgets[cats[0].category]){
    recs.push({priority:'high', icon:'expense', title:`Rein in ${cats[0].category} spending`,
      body:`This is your top category and it's over budget. Try a weekly cap or switch one habit (e.g. fewer food deliveries).`});
  }
  if(STATE.investments.length===0){
    recs.push({priority:'medium', icon:'invest', title:'Improve investment diversification',
      body:'Nothing invested yet. Given a conservative profile, a small PPF contribution or index-fund SIP is a reasonable, low-risk start.'});
  }
  if(STATE.debts.length>0){
    recs.push({priority:'high', icon:'debt', title:'Prioritize high-interest debt first',
      body:'Pay minimums on everything, then send extra money to whichever debt has the highest interest rate.'});
  }
  recs.push({priority: sr<15?'medium':'low', icon:'budget', title:'Optimize the monthly budget',
    body: sr<15 ? 'Review discretionary categories — Entertainment and Subscriptions are usually the easiest to trim first.' : 'Budget looks well-controlled. Consider automating transfers to goals right when funds arrive.'});
  recs.push({priority:'low', icon:'savings', title:'Increase the savings rate gradually',
    body:'Even a 5% increase compounds meaningfully — try raising it slightly each time income increases.'});

  const order = {high:0, medium:1, low:2};

async function askAdvisor(question){
  const chat = document.getElementById('advisor-chat');
  const userBubble = document.createElement('div');
  userBubble.style.cssText='align-self:flex-end;max-width:88%;background:var(--teal-dim);color:var(--text);padding:9px 12px;border-radius:12px 12px 2px 12px;font-size:13px;';
  userBubble.textContent = question;
  chat.appendChild(userBubble);
  const loadingBubble = document.createElement('div');
  loadingBubble.style.cssText='align-self:flex-start;max-width:88%;background:var(--surface-2);padding:9px 12px;border-radius:12px 12px 12px 2px;';
  loadingBubble.innerHTML = '<div class="loader-ring"></div>';
  chat.appendChild(loadingBubble);
  chat.scrollTop = chat.scrollHeight;

  const context = `You are a friendly, conservative-minded personal finance advisor for a hostel student in India with no regular income (occasional family support), risk tolerance: conservative, investment experience: beginner. Current snapshot: monthly income ~${fmt(monthlyIncomeTotal())}, monthly expenses ~${fmt(currentMonthExpenses())}, emergency fund ${fmt(STATE.emergencyFund.current)} of ${fmt(STATE.emergencyFund.target)} target, ${STATE.goals.length} active goals, ${STATE.debts.length} debts, ${STATE.investments.length} investments. Answer briefly (under 120 words), practically, in INR, no financial-advisor disclaimers beyond one short line at the end.`;

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user', content: context + '\n\nQuestion: ' + question}]
      })
    });
    const data = await response.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n') || 'Sorry, I could not generate a response.';
    loadingBubble.style.background='var(--surface-2)';
    loadingBubble.innerHTML = '';
    loadingBubble.textContent = text;
    loadingBubble.style.fontSize='13px';
  }catch(e){
    loadingBubble.innerHTML = '';
    loadingBubble.textContent = 'Could not reach the AI advisor right now — check your connection and try again.';
    loadingBubble.style.color = 'var(--rose)';
  }
  chat.scrollTop = chat.scrollHeight;
}

function runCalc(id){
  const num = (elId)=> Number(document.getElementById(elId)?.value || 0);
  const out = document.getElementById('calc-output');
  if(!out) return;
  let html = '';
  if(id==='sip'){
    const P=num('c-amount'), annualRate=num('c-rate'), years=num('c-years');
    const n = years*12, r = annualRate/100/12;
    const fv = r>0 ? P * ((Math.pow(1+r,n)-1)/r) * (1+r) : P*n;
    const invested = P*n;
    html = calcResultBlock('Maturity Value', fv, [
      ['Total Invested', fmt(invested)],
      ['Estimated Returns', fmt(fv-invested)],
      ['Duration', `${years} years (${n} installments)`],
    ]);
  } else if(id==='compound'){
    const P=num('c-principal'), rate=num('c-rate'), years=num('c-years'), freq=num('c-freq')||1;
    const fv = P * Math.pow(1+(rate/100)/freq, freq*years);
    html = calcResultBlock('Future Value', fv, [
      ['Principal', fmt(P)],
      ['Interest Earned', fmt(fv-P)],
      ['Effective Growth', pct(((fv-P)/P)*100)+'%'],
    ]);
  } else if(id==='emi'){
    const P=num('c-principal'), annualRate=num('c-rate'), months=num('c-months');
    const r = annualRate/100/12;
    const emi = r>0 ? (P*r*Math.pow(1+r,months))/(Math.pow(1+r,months)-1) : P/months;
    const totalPay = emi*months;
    html = calcResultBlock('Monthly EMI', emi, [
      ['Total Payment', fmt(totalPay)],
      ['Total Interest', fmt(totalPay-P)],
      ['Tenure', `${months} months`],
    ]);
  } else if(id==='payoff'){
    const bal=num('c-balance'), annualRate=num('c-rate'), pay=num('c-payment');
    const r = annualRate/100/12;
    let balance=bal, months=0, totalInterest=0;
    while(balance>0 && months<600){
      const interest = balance*r;
      totalInterest += interest;
      balance = balance + interest - pay;
      months++;
      if(pay<=interest && r>0){ months=-1; break; }
    }
    html = months===-1 ? `<div class="empty-state">${ICON.debt}<p>This payment won't cover the interest — increase the monthly payment.</p></div>` :
      calcResultBlock(`${months} months`, null, [
        ['Total Interest Paid', fmt(totalInterest)],
        ['Total Paid', fmt(bal+totalInterest)],
        ['Debt-Free Date', (()=>{const d=new Date(); d.setMonth(d.getMonth()+months); return d.toLocaleString('en-IN',{month:'short',year:'numeric'});})()],
      ], true);
  } else if(id==='savings'){
    const target=num('c-target'), current=num('c-current'), months=num('c-months')||1, rate=num('c-rate');
    const r = rate/100/12;
    const needed = target-current;
    const monthlyReq = r>0 ? (needed*r)/(Math.pow(1+r,months)-1) : needed/months;
    html = calcResultBlock('Required Monthly Savings', monthlyReq, [
      ['Amount Still Needed', fmt(needed)],
      ['Timeframe', `${months} months`],
      ['Target Date', addMonthsFromNow(months)],
    ]);
  } else if(id==='retirement'){
    const age=num('c-age'), retireAge=num('c-retireage'), expense=num('c-expense'), inflation=num('c-inflation'), postYears=num('c-years');
    const yearsToRetire = Math.max(retireAge-age,0);
    const futureMonthlyExpense = expense*Math.pow(1+inflation/100, yearsToRetire);
    const corpus = futureMonthlyExpense*12*postYears;
    html = calcResultBlock('Estimated Corpus Needed', corpus, [
      ['Years to Retirement', yearsToRetire],
      ['Future Monthly Expense', fmt(futureMonthlyExpense)],
      ['Planning Horizon', `${postYears} years post-retirement`],
    ]);
  } else if(id==='inflation'){
    const amt=num('c-amount'), rate=num('c-rate'), years=num('c-years');
    const future = amt*Math.pow(1+rate/100, years);
    const realValueLoss = amt - (amt/Math.pow(1+rate/100,years));
    html = calcResultBlock(`Feels like ${fmt(future)}`, null, [
      ['Today\'s Amount', fmt(amt)],
      ['Equivalent in the Future', fmt(future)],
      ['Purchasing Power Lost (today\'s ₹)', fmt(realValueLoss)],
    ], true);
  }
  out.innerHTML = html;
}
function addMonthsFromNow(n){ const d=new Date(); d.setMonth(d.getMonth()+n); return d.toLocaleString('en-IN',{month:'short',year:'numeric'}); }
function calcResultBlock(heroLabel, heroValue, rows, heroIsText=false){
  return `
    <div class="eyebrow">Result</div>
    <div class="stat-value num" style="font-size:30px;margin:6px 0 18px;color:var(--teal);">${heroIsText?heroLabel:fmt(heroValue)}</div>
    <div class="divider"></div>

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      STATE = Object.assign(defaultState(), parsed);
      saveState();
      toast('Data imported successfully.');
      buildShell(); goTab(CURRENT_TAB);
      document.documentElement.setAttribute('data-theme', STATE.theme);
    }catch(err){
      toast('Import failed — file is not valid JSON.', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function computeWhatIf(){
  const w = WHATIF;
  const baseIncome = monthlyIncomeTotal() * (1 + w.incomeChangePct/100);
  const baseExpense = currentMonthExpenses() * (1 - w.expenseCutPct/100);
  const newCashFlow = baseIncome - baseExpense + w.extraSavings - w.extraDebtPayment;
  const currentCashFlow = monthlyCashFlow();
  const twelveMoSavings = newCashFlow*12;
  const inflatedExpense12mo = baseExpense * Math.pow(1+w.inflationPct/100, 1);
  const newDebtMonths = STATE.debts.length ? Math.ceil(totalDebtBalance() / Math.max(1, (STATE.debts.reduce((s,d)=>s+Number(d.minPayment||0),0) + w.extraDebtPayment))) : 0;
  const oldDebtMonths = STATE.debts.length ? Math.ceil(totalDebtBalance() / Math.max(1, STATE.debts.reduce((s,d)=>s+Number(d.minPayment||0),0))) : 0;

  return { baseIncome, baseExpense, newCashFlow, currentCashFlow, twelveMoSavings, inflatedExpense12mo, newDebtMonths, oldDebtMonths };
}

function projectedCompletion(current, target, monthlyContribution){
  if(current>=target) return 'Complete';
  if(monthlyContribution<=0) return 'Add contributions to project';
  const monthsLeft = Math.ceil((target-current)/monthlyContribution);
  const d = new Date(); d.setMonth(d.getMonth()+monthsLeft);
  return d.toLocaleString('en-IN',{month:'short', year:'numeric'}) + ` (~${monthsLeft} mo)`;
}

      <h1>Financial Health Score</h1>
      <p>Built from your savings rate, emergency fund coverage, budget discipline, debt load and goal progress — recalculated live as you update your numbers.</p>
      <div class="hero-metrics">
        <div class="hero-metric"><div class="v num">${fmt(nw)}</div><div class="l">Net Worth</div></div>
        <div class="hero-metric"><div class="v num" style="color:${cf>=0?'var(--teal)':'var(--rose)'}">${cf>=0?'+':''}${fmt(cf)}</div><div class="l">Monthly Cash Flow</div></div>
        <div class="hero-metric"><div class="v num">${pct(savingsRate())}%</div><div class="l">Savings Rate</div></div>
        <div class="hero-metric"><div class="v num">${efMonths.toFixed(1)}mo</div><div class="l">Emergency Runway</div></div>
      </div>
    </div>
  </div>

  <div class="grid grid-4" style="margin-bottom:16px;">
    ${statCard('Total Assets', totalAssets(), 'teal','savings')}
    ${statCard('Total Liabilities', totalDebtBalance(), 'rose','debt')}
    ${statCard('Monthly Income', inc, 'sky','income')}
    ${statCard('Monthly Expenses', exp, 'amber','expense')}
  </div>

  <div class="grid grid-12" style="margin-bottom:16px;">
    <div class="card span-7 hoverable">
      <div class="card-head">
        <div><div class="eyebrow">Last 6 months</div><h3>Cash Flow Trend</h3></div>
        <span class="pill ${cf>=0?'teal':'rose'}">${cf>=0?'Surplus':'Deficit'}</span>
      </div>
      ${sparkline(trend.map(t=>t.income-t.expense), 560, 130, cf>=0?'var(--teal)':'var(--rose)')}
      <div style="display:flex;justify-content:space-between;margin-top:6px;">
        ${trend.map(t=>`<span class="mono" style="font-size:10.5px;color:var(--text-faint);">${t.label}</span>`).join('')}
      </div>
    </div>
    <div class="card span-5 hoverable">
      <div class="card-head"><div><div class="eyebrow">This month</div><h3>Where It Went</h3></div></div>
      ${cats.length ? `
        <div class="donut-wrap">
          ${svgDonut(cats.map((c,i)=>({value:c.value, color:colorFor(c.category,i)})))}
          <div class="donut-center"><div class="stat-value num" style="font-size:20px;">${fmt(exp)}</div><div class="stat-label">Total spent</div></div>
        </div>
        <div class="legend">
          ${cats.map((c,i)=>`<div class="legend-row"><span class="legend-dot" style="background:${colorFor(c.category,i)}"></span>${c.category}<span class="amt num">${fmt(c.value)}</span></div>`).join('')}
        </div>` : emptyState('No expenses logged this month yet.')}
    </div>
  </div>

  <div class="grid grid-12">
    <div class="card span-7 hoverable">
      <div class="card-head"><div><div class="eyebrow">Auto-generated</div><h3>Insights</h3></div></div>
      ${renderInsightList(generateInsights()).join('')}
    </div>
    <div class="card span-5 hoverable">
      <div class="card-head"><div><div class="eyebrow">Progress</div><h3>Goals at a Glance</h3></div></div>
      ${STATE.goals.length ? STATE.goals.slice(0,4).map(g=>{
        const p = clamp((g.current/(g.target||1))*100,0,100);
        return `<div class="bar-row"><div class="bar-row-top"><span class="name">${esc(g.name)}</span><span class="amt">${fmt(g.current)} / ${fmt(g.target)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:linear-gradient(90deg,var(--teal),var(--sky))"></div></div></div>`;
      }).join('') : emptyState('No goals yet — add one in Savings & Goals.')}
    </div>
  </div>
  `;
}
function statCard(label, value, color, icon){
  return `<div class="card hoverable">
    <div class="card-icon" style="background:var(--${color}-dim);color:var(--${color});">${ICON[icon]}</div>
    <div class="stat-value num" style="margin-top:12px;">${fmt(value)}</div>
    <div class="stat-label">${label}</div>
  </div>`;
}
function emptyState(msg){
  return `<div class="empty-state">${ICON.target}<p>${msg}</p></div>`;
}
function renderInsightList(items){
  return items.map(it => `
    <div class="insight-card">
      <div class="insight-icon" style="background:var(--${it.color}-dim);color:var(--${it.color});">${ICON[it.icon]}</div>
      <div><div class="insight-title">${it.title}</div><div class="insight-body">${it.body}</div></div>
    </div>`);
}
/* ================================================================
   INSIGHT / RECOMMENDATION ENGINE (rule-based, fully offline)
   ================================================================ */
function generateInsights(){
  const out = [];
  const sr = savingsRate();
  const efMonths = emergencyFundMonths();
  const bu = budgetUtilization();
  const cats = expensesByCategory(true);
  const inc = monthlyIncomeTotal();

  if(efMonths < 1){
    out.push({icon:'shield', color:'rose', title:'Emergency fund needs attention',
      body:`You have about ${efMonths.toFixed(1)} month of expenses saved. Even ${fmt(500)}/month set aside builds a real cushion over a semester.`});
  } else if(efMonths < 3){
    out.push({icon:'shield', color:'amber', title:'Emergency fund is building nicely',
      body:`You're at ${efMonths.toFixed(1)} months of coverage. Aim for 3 months of expenses as your hostel-life safety net.`});
  } else {
    out.push({icon:'shield', color:'teal', title:'Emergency fund is solid',
      body:`${efMonths.toFixed(1)} months of coverage — that's a strong buffer for a student budget.`});
  }

  if(cats.length){
    const top = cats[0];
    const budgetForTop = STATE.budgets[top.category];
    if(budgetForTop && top.value > budgetForTop){
      out.push({icon:'expense', color:'rose', title:`${top.category} is over budget`,
        body:`You've spent ${fmt(top.value)} against a ${fmt(budgetForTop)} budget this month — that's ${pct(((top.value-budgetForTop)/budgetForTop)*100)}% over.`});
    } else {
      out.push({icon:'expense', color:'sky', title:`Biggest category: ${top.category}`,
        body:`${fmt(top.value)} spent so far this month, ${pct((top.value/(exp()||1))*100)}% of your total outflow.`});
    }
  }

  if(sr < 0){
    out.push({icon:'whatif', color:'rose', title:'Spending more than you\'re receiving',
      body:`This month's expenses outpace income by ${fmt(Math.abs(monthlyCashFlow()))}. Check the Budget tab to find where to trim.`});
  } else if(sr < 15 && inc>0){
    out.push({icon:'savings', color:'amber', title:'Savings rate has room to grow',
      body:`You're saving ${pct(sr)}% of income. Even trimming one discretionary category by 20% could lift this meaningfully.`});
  } else if(inc>0){
    out.push({icon:'savings', color:'teal', title:'Healthy savings rate',
      body:`At ${pct(sr)}%, you're saving a solid share of what comes in. Consider directing some of it into a beginner SIP.`});
  }

  if(STATE.investments.length===0){
    out.push({icon:'invest', color:'purple', title:'Investing hasn\'t started yet',
      body:`With a conservative risk profile, a small recurring SIP in an index fund or a PPF contribution is a low-risk way to begin.`});
  }

  const subsTotal = STATE.subscriptions.reduce((s,x)=>s+Number(x.amount||0),0);
  if(subsTotal > 0){
    out.push({icon:'subs', color:'sky', title:'Recurring subscriptions',
      body:`${fmt(subsTotal)}/month across ${STATE.subscriptions.length} subscription${STATE.subscriptions.length>1?'s':''}. Small, but worth a quarterly review.`});
  }

  function exp(){ return currentMonthExpenses(); }
  return out.slice(0,5);
}

function last6MonthsExpenseTrend(){
  const out = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const ym = d.toISOString().slice(0,7);
    const expense = STATE.expenses.filter(e=>e.date.slice(0,7)===ym).reduce((s,e)=>s+Number(e.amount||0),0);
    out.push({label:d.toLocaleString('en-IN',{month:'short'}), income: monthlyIncomeTotal(), expense});
  }
  return out;
}

</script>
